<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>유초이음 적응 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after { box-sizing: border-box; }
        html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; -webkit-text-size-adjust:100%; }
        body { font-family: 'Nanum Gothic', 'Jua', sans-serif; font-weight:700; background:#fff; overscroll-behavior:none; -webkit-tap-highlight-color:transparent; }
        #root { position:fixed; inset:0; display:flex; align-items:stretch; justify-content:stretch; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        .app-frame { width:100%; height:100%; background:white; overflow:hidden; display:flex; flex-direction:column; position:relative; }
        .jua { font-family: 'Jua', 'Nanum Gothic', sans-serif; }
        .ngo { font-family: 'Nanum Gothic', sans-serif; font-weight:800; }

        .custom-sc::-webkit-scrollbar { width:8px; height:8px; }
        .custom-sc::-webkit-scrollbar-track { background:rgba(0,0,0,0.02); border-radius:10px; }
        .custom-sc::-webkit-scrollbar-thumb { background-color:#cbd5e1; border-radius:10px; }
        .custom-sc { scrollbar-width:thin; scrollbar-color:#cbd5e1 rgba(0,0,0,0.02); }

        :root {
            --fs-xs: clamp(1rem, 1.6vmin, 1.2rem);
            --fs-sm: clamp(1.2rem, 2vmin, 1.5rem);
            --fs-md: clamp(1.4rem, 2.6vmin, 1.85rem);
            --fs-lg: clamp(1.7rem, 3.3vmin, 2.4rem);
            --fs-xl: clamp(2.1rem, 4.2vmin, 2.9rem);
            --fs-2xl: clamp(2.5rem, 5.2vmin, 3.6rem);
            --fs-3xl: clamp(3rem, 6.5vmin, 4.6rem);
        }
        .fs-xs{font-size:var(--fs-xs)} .fs-sm{font-size:var(--fs-sm)} .fs-md{font-size:var(--fs-md)}
        .fs-lg{font-size:var(--fs-lg)} .fs-xl{font-size:var(--fs-xl)} .fs-2xl{font-size:var(--fs-2xl)} .fs-3xl{font-size:var(--fs-3xl)}

        @keyframes fade-up { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)} }
        .fade-up { animation: fade-up .3s ease-out both; }
        @keyframes pop { from{opacity:0; transform:scale(.7)} to{opacity:1; transform:scale(1)} }
        .pop { animation: pop .35s cubic-bezier(.34,1.56,.64,1) both; }
        @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .bob { animation: bob 2s ease-in-out infinite; }
        @keyframes wiggle { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-5deg)} 75%{transform:rotate(5deg)} }
        .wiggle { animation: wiggle 1.5s ease-in-out infinite; }
        @keyframes spin { to { transform:rotate(360deg) } }
        .spin-anim { animation: spin .9s linear infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .pulse-anim { animation: pulse 1.6s ease-in-out infinite; }
        @keyframes blink-red {
            0%,100% { background:#ef4444; box-shadow:0 0 0 0 rgba(239,68,68,.7); }
            50% { background:#dc2626; box-shadow:0 0 0 12px rgba(239,68,68,0); }
        }
        .blink-red { animation: blink-red 1.4s ease-out infinite; }

        @keyframes confetti-fall {
            0% { transform: translate(0,0) rotate(0deg) scale(0); opacity: 1; }
            15% { transform: translate(var(--tx-mid),var(--ty-mid)) rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: translate(var(--tx),var(--ty)) rotate(720deg) scale(.5); opacity: 0; }
        }
        .confetti {
            position: absolute; top: 50%; left: 50%;
            font-size: clamp(2rem, 4vmin, 3.5rem);
            pointer-events: none;
            animation: confetti-fall 1.6s cubic-bezier(.4,.7,.7,1) forwards;
            z-index: 100;
        }

        .tts-highlight { background: linear-gradient(120deg, #fde68a 0%, #fcd34d 100%); border-radius: 4px; padding: 0 3px; margin: 0 1px; transition: background .15s ease; }
        .tts-word { transition: all .15s ease; }

        .btn-shadow { box-shadow: 0 6px 0 rgba(0,0,0,0.1), 0 8px 16px rgba(0,0,0,0.08); transition: all .15s ease; }
        .btn-shadow:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.08); }

        .speaker-on-glow { box-shadow: 0 0 0 3px rgba(96,165,250,.4), 0 4px 12px rgba(96,165,250,.3); }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f59e0b' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.5em;
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            padding-right: 3rem !important;
        }
        select option { font-family: 'Jua', sans-serif; padding: 8px; }

        .rainbow-text { background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e, #3b82f6, #8b5cf6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .mood-btn { transition: all 0.2s; }
        .mood-btn-selected { transform: scale(1.15); }

        @keyframes sticker-in {
            0% { opacity: 0; transform: scale(0) rotate(-180deg); }
            70% { opacity: 1; transform: scale(1.4) rotate(20deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .sticker-in { animation: sticker-in .8s cubic-bezier(.34,1.56,.64,1) both; }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxcgilhwhUVIC-E_rUFZj2lqMC-JUWs_VjdQWKNy-DmG-qNuzffSSDya9nsVcD6lYtcYQ/exec';

        /* ══════════════════════════════════════════════
           ★ 3주 프로그램 데이터 ★
        ══════════════════════════════════════════════ */

        // 15개 명언 (유치원~1학년 눈높이, 자존감/공감 중심)
        const QUOTES = [
            "오늘도 학교에 와줘서 정말 고마워!",

            "내 물건은 내가 챙겨요. 나는 할 수 있어요!",

        ];

        // 15개 스티커 (3주 컬렉션)
        const STICKER_POOL = [
            { id: 1, emoji: '🌟', name: '반짝별' },
            { id: 2, emoji: '🌈', name: '무지개' },
            { id: 3, emoji: '🦄', name: '유니콘' },
            { id: 4, emoji: '🎀', name: '리본' },
            { id: 5, emoji: '🌸', name: '벚꽃' },
            { id: 6, emoji: '🍀', name: '네잎클로버' },
            { id: 7, emoji: '🐻', name: '곰돌이' },
            { id: 8, emoji: '🐰', name: '토끼' },
            { id: 9, emoji: '🦋', name: '나비' },
            { id: 10, emoji: '🌻', name: '해바라기' },
            { id: 11, emoji: '🍭', name: '사탕' },
            { id: 12, emoji: '🎈', name: '풍선' },
            { id: 13, emoji: '⭐', name: '별' },
            { id: 14, emoji: '💎', name: '다이아' },
            { id: 15, emoji: '🏆', name: '트로피' },
        ];

        // 마음 온도계
        const MOODS = [
            { emoji: '😄', label: '최고예요!', color: 'from-yellow-200 to-orange-300', textColor: 'text-orange-800' },
            { emoji: '😊', label: '좋아요', color: 'from-green-100 to-green-200', textColor: 'text-green-800' },
            { emoji: '😐', label: '그냥 그래요', color: 'from-slate-100 to-slate-200', textColor: 'text-slate-700' },
            { emoji: '😢', label: '슬퍼요', color: 'from-blue-100 to-blue-200', textColor: 'text-blue-800' },
            { emoji: '😭', label: '많이 힘들어요', color: 'from-red-100 to-red-200', textColor: 'text-red-800' },
        ];

        /* 디버그 */
        const debugLogs = [];
        const debugListeners = [];
        const dbg = (type, msg, data) => {
            const entry = { time: new Date().toLocaleTimeString('ko-KR'), type, msg, data };
            debugLogs.push(entry);
            if (debugLogs.length > 50) debugLogs.shift();
            debugListeners.forEach(fn => fn([...debugLogs]));
            console.log(`[${type}]`, msg, data || '');
        };

        /* API */
        const api = {
            async getData() {
                if (!GAS_URL) { dbg('WARN', 'GAS_URL 미설정'); return null; }
                dbg('GET', 'getData 요청');
                try {
                    const res = await fetch(GAS_URL, { redirect: 'follow' });
                    dbg('GET', `응답: ${res.status}`);
                    const text = await res.text();
                    try {
                        const json = JSON.parse(text);
                        dbg('GET', '성공', { keys: Object.keys(json) });
                        return json;
                    } catch(e) { dbg('ERR', 'JSON 파싱 실패', { preview: text.slice(0, 200) }); return null; }
                } catch (e) { dbg('ERR', '네트워크 오류', e.toString()); return null; }
            },
            async post(payload) {
                if (!GAS_URL) return { success: true, mock: true };
                dbg('POST', `요청: ${payload.action}`);
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload),
                        redirect: 'follow'
                    });
                    const text = await res.text();
                    try {
                        const json = JSON.parse(text);
                        dbg('POST', `${payload.action} 결과`, json);
                        return json;
                    } catch(e) { dbg('ERR', 'POST JSON 파싱 실패', text.slice(0, 200)); return { success: false }; }
                } catch (e) { dbg('ERR', 'POST 네트워크 오류', e.toString()); return { success: false }; }
            }
        };

        /* TTS */
        let cachedVoice = null;
        const pickKoreanVoice = () => {
            if (cachedVoice) return cachedVoice;
            const voices = window.speechSynthesis.getVoices();
            if (!voices.length) return null;
            let v = voices.find(x => x.lang === 'ko-KR' && x.name.toLowerCase().includes('google') && !x.localService);
            if (v) { cachedVoice = v; return v; }
            v = voices.find(x => x.lang === 'ko-KR' && /wavenet|neural|premium|enhanced|natural/i.test(x.name));
            if (v) { cachedVoice = v; return v; }
            v = voices.find(x => x.lang === 'ko-KR' && x.name.toLowerCase().includes('google'));
            if (v) { cachedVoice = v; return v; }
            v = voices.find(x => x.lang.startsWith('ko'));
            if (v) { cachedVoice = v; return v; }
            return voices[0];
        };
        const speak = (text, opts = {}) => {
            return new Promise((resolve) => {
                if (!('speechSynthesis' in window)) { resolve(); return; }
                window.speechSynthesis.cancel();
                const utt = new SpeechSynthesisUtterance(text);
                const voice = pickKoreanVoice();
                if (voice) utt.voice = voice;
                utt.lang = 'ko-KR';
                utt.pitch = opts.pitch ?? 1.0;
                utt.rate = opts.rate ?? 0.95;
                utt.volume = opts.volume ?? 1.0;
                utt.onend = () => resolve();
                utt.onerror = () => resolve();
                if (opts.onBoundary) utt.onboundary = opts.onBoundary;
                window.speechSynthesis.speak(utt);
            });
        };
        const stopSpeak = () => { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); };

        /* 효과음 */
        let audioCtx = null;
        let speakerEnabled = false;
        const setSpeakerEnabled = (v) => { speakerEnabled = v; };
        const getAudio = () => {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        };
        const playTone = (freq, dur, type='sine', vol=0.15) => {
            if (!speakerEnabled) return;
            const ctx = getAudio(); if (!ctx) return;
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + dur);
        };
        const sfx = {
            click: () => playTone(800, 0.08, 'sine', 0.1),
            correct: () => { playTone(523,0.12); setTimeout(()=>playTone(659,0.12),100); setTimeout(()=>playTone(784,0.2),200); },
            wrong: () => { playTone(300,0.15,'sawtooth',0.1); setTimeout(()=>playTone(200,0.25,'sawtooth',0.1),150); },
            complete: () => { playTone(523,0.1); setTimeout(()=>playTone(659,0.1),100); setTimeout(()=>playTone(784,0.1),200); setTimeout(()=>playTone(1047,0.3),300); },
            sparkle: () => { for (let i=0;i<3;i++) setTimeout(()=>playTone(1200+i*300,0.08),i*60); }
        };

        /* 칭찬 스티커 폭죽 */
        const StickerBurst = ({ stickers = ['⭐','🌟','💖','🎉','🌈','✨','🎀','🌸'], onDone }) => {
            const [items] = useState(() => {
                const out = [];
                for (let i = 0; i < 18; i++) {
                    const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.4;
                    const dist = 200 + Math.random() * 180;
                    out.push({
                        emoji: stickers[Math.floor(Math.random() * stickers.length)],
                        tx: Math.cos(angle) * dist + 'px',
                        ty: Math.sin(angle) * dist + 'px',
                        txMid: Math.cos(angle) * (dist*0.4) + 'px',
                        tyMid: Math.sin(angle) * (dist*0.4) - 30 + 'px',
                        delay: Math.random() * 0.2
                    });
                }
                return out;
            });
            useEffect(() => {
                sfx.sparkle();
                const t = setTimeout(() => onDone && onDone(), 1700);
                return () => clearTimeout(t);
            }, []);
            return (
                <div className="fixed inset-0 pointer-events-none z-[200]">
                    {items.map((it, i) => (
                        <span key={i} className="confetti" style={{
                            '--tx': it.tx, '--ty': it.ty,
                            '--tx-mid': it.txMid, '--ty-mid': it.tyMid,
                            animationDelay: it.delay + 's'
                        }}>{it.emoji}</span>
                    ))}
                </div>
            );
        };

        /* TTS 따라 읽기 */
        const HighlightedText = ({ text, speakerOn, autoPlay = false, onDone, className = '' }) => {
            const [hlIdx, setHlIdx] = useState(-1);
            const playingRef = useRef(false);
            const play = useCallback(async () => {
                if (!speakerOn) { onDone && onDone(); return; }
                if (playingRef.current) return;
                playingRef.current = true;
                stopSpeak();
                let wordIdx = -1;
                await speak(text, {
                    onBoundary: (e) => { if (e.name === 'word') { wordIdx++; setHlIdx(wordIdx); } }
                });
                setHlIdx(-1);
                playingRef.current = false;
                onDone && onDone();
            }, [text, speakerOn, onDone]);
            useEffect(() => {
                if (autoPlay && speakerOn) {
                    const t = setTimeout(play, 300);
                    return () => { clearTimeout(t); stopSpeak(); };
                }
                if (autoPlay && !speakerOn) onDone && onDone();
            }, [autoPlay, speakerOn]);
            const words = text.split(/(\s+)/);
            let wIdx = -1;
            return (
                <span className={className}>
                    {words.map((w, i) => {
                        if (/^\s+$/.test(w)) return <span key={i}>{w}</span>;
                        wIdx++;
                        const isHl = wIdx === hlIdx;
                        return <span key={i} className={"tts-word " + (isHl ? 'tts-highlight' : '')}>{w}</span>;
                    })}
                </span>
            );
        };

        /* 샘플 데이터 */
        const MOCK = {
            Students: [{ 학번: '10101', 이름: '새싹이' }, { 학번: '10102', 이름: '김철수' }, { 학번: '10103', 이름: '이영희' }],
            Education: [{ 제목: '우유팩 혼자 열기 연습', 내용: '학교 급식시간에 우유를 스스로 열 수 있도록 집에서 미리 연습시켜주세요!' }],
            Checklist: [
                { 항목: '취학 전 필수 예방접종을 모두 마쳤나요?', 카테고리: '입학전' },
                { 항목: '학교 가는 길을 안전하게 걸어보는 연습을 했나요?', 카테고리: '입학전' },
                { 항목: '아침에 스스로 일어났나요?', 카테고리: '데일리' },
                { 항목: '알림장을 스스로 확인했나요?', 카테고리: '데일리' },
                { 항목: '화장실 다녀와서 손 씻었나요?', 카테고리: '데일리' },
                { 항목: '내 자리를 정돈했나요?', 카테고리: '데일리' },
                { 항목: '선생님께 웃으며 인사했나요?', 카테고리: '데일리' },
            ],
            Transition: [{ 질문: '준비물을 혼자 챙기게 도와주고 싶은데 어떻게 할까요?', 답변: '첫 달은 부모님이 함께 챙기고, 이후엔 아이가 먼저 챙기게 한 뒤 최종 검토만 해주세요.', 카테고리: '자립' }],
            ChecklistStats: [],
            Records: []
        };

        class ErrBound extends React.Component {
            constructor(p) { super(p); this.state = { err: null }; }
            static getDerivedStateFromError(e) { return { err: e }; }
            render() {
                if (this.state.err) return (
                    <div className="p-8 bg-red-50 h-full">
                        <h1 className="text-xl font-bold text-red-600 mb-3">오류가 발생했어요</h1>
                        <pre className="text-xs text-red-800 bg-white p-4 rounded-xl whitespace-pre-wrap">{this.state.err.toString()}</pre>
                    </div>
                );
                return this.props.children;
            }
        }

        const Fairy = ({ mood = 'happy', cls = '' }) => (
            <div className={"inline-block bob " + cls}>
                <svg width="100" height="120" viewBox="0 0 120 150" fill="none">
                    <path d="M45 60C40 30 30 10 45 10C55 10 55 40 50 60" fill="#FAF089" stroke="#B7791F" strokeWidth="2" />
                    <path d="M75 60C80 30 90 10 75 10C65 10 65 40 70 60" fill="#FAF089" stroke="#B7791F" strokeWidth="2" />
                    <ellipse cx="60" cy="80" rx="35" ry="30" fill="#FFFFF0" stroke="#B7791F" strokeWidth="2" />
                    <circle cx="50" cy="75" r="3.5" fill="#2D3748" />
                    <circle cx="70" cy="75" r="3.5" fill="#2D3748" />
                    <circle cx="51" cy="74" r="1.2" fill="white" />
                    <circle cx="71" cy="74" r="1.2" fill="white" />
                    {mood === 'happy'

            const [editableStt, setEditableStt] = useState('');
            const mr = useRef(null);
            const chunks = useRef([]);
            const b64 = useRef(null);
            const recognitionRef = useRef(null);

            useEffect(() => {
                if (speakerOn && mode === 'choose') speak('어떻게 다짐을 남길지 골라볼까요?');
                return () => {
                    stopSpeak();
                    if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch(e) {} }

            }, [mode]);

            const examples = [
                "나는 학교 가기 전에 스스로 가방을 챙길 거에요!",
                "나는 선생님을 만나면 공손하게 인사할 거에요!",
                "나는 친구들에게 먼저 웃으며 인사할 거에요!",
                "나는 급식을 골고루 남기지 않고 먹을 거에요!",
                "나는 복도에서 조용히 걸어 다닐 거에요!",
            ];

            const [sttSupported] = useState(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                const supported = !!SR;
                dbg('STT', supported ? '✅ STT 지원됨' : '❌ STT 미지원 브라우저 (Chrome 권장)');
                return supported;
            });

            const startSTT = () => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { dbg('STT', '미지원 브라우저'); return; }
                try {
                    const r = new SR();
                    r.lang = 'ko-KR';
                    r.continuous = true;
                    r.interimResults = true;
                    let finalText = '';
                    r.onresult = (e) => {
                        let interim = '';
                        for (let i = e.resultIndex; i < e.results.length; i++) {
                            const t = e.results[i][0].transcript;
                            if (e.results[i].isFinal) finalText += t + ' ';
                            else interim += t;
                        }
                        setSttFinal(finalText);
                        setSttText(finalText + interim);
                        setEditableStt(finalText.trim()); // 실시간으로 수정란에도 반영
                        dbg('STT', '인식 결과', finalText + interim);
                    };
                    r.onerror = (e) => {
                        dbg('ERR', 'STT 오류', e.error);
                        if (e.error === 'not-allowed') alert('마이크 권한이 필요해요!');
                        if (e.error === 'no-speech') dbg('STT', '음성 없음 - 다시 말해주세요');
                    };
                    r.onstart = () => dbg('STT', '🎤 음성 인식 시작');
                    r.onend = () => dbg('STT', '음성 인식 종료');
                    r.start();
                    recognitionRef.current = r;
                } catch(e) { dbg('ERR', 'STT 시작 실패', e.toString()); }
            };
            const stopSTT = () => { if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch(e) {} recognitionRef.current = null; } };

            const start = async () => {
                sfx.click();
                setSttText(''); setSttFinal(''); setEditableStt('');
                try {
                    const stream = providedStream || await navigator.mediaDevices.getUserMedia({ audio: true });
                    mr.current = new MediaRecorder(stream);
                    chunks.current = [];
                    mr.current.ondataavailable = e => { if (e.data.size > 0) chunks.current.push(e.data); };
                    mr.current.onstop = () => {
                        const blob = new Blob(chunks.current, { type: 'audio/webm' });
                        setAudioUrl(URL.createObjectURL(blob));
                        const rd = new FileReader();
                        rd.readAsDataURL(blob);
                        rd.onloadend = () => { b64.current = rd.result; };
                    };
                    mr.current.start();
                    setState('rec');
                    startSTT();
                } catch (e) { alert("마이크를 사용할 수 없습니다."); }
            };

            const stop = () => {
                sfx.click();
                stopSTT();
                if (mr.current && mr.current.state === 'recording') {
                    mr.current.stop();
                    if (!providedStream) mr.current.stream.getTracks().forEach(t => t.stop());
                }
                setEditableStt(sttFinal.trim());
                setState('done');
            };

            const submitText = () => {
                if (!textInput.trim()) { alert('다짐을 입력해주세요!'); return; }
                sfx.click();
                onDone(null, textInput.trim());
            };

            const submitVoice = () => {
                sfx.click();
                // 우선순위: 사용자가 직접 수정한 텍스트 → STT 최종 결과 → STT 임시 결과
                const finalText = (editableStt.trim() || sttFinal.trim() || sttText.trim() || '');
                onDone(b64.current, finalText);
            };

            if (mode === 'choose') return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-gradient-to-b from-amber-50 to-yellow-100 p-4 text-center overflow-y-auto custom-sc">
                    <div className="pop w-full flex flex-col items-center gap-5 max-w-2xl">
                        <Fairy mood="happy" cls="scale-100" />
                        <h2 className="fs-2xl jua text-amber-900">✨ 다짐을 남겨요!</h2>
                        <p className="fs-md jua text-amber-700 px-4 leading-relaxed">
                            <HighlightedText text="어떻게 나의 다짐을 남길까요? 마음에 드는 방법을 골라보세요!" speakerOn={speakerOn} autoPlay={true} />
                        </p>
                        <div className="flex gap-3 w-full max-w-xl">
                            <button onClick={() => { sfx.click(); setMode('voice'); }} className="flex-1 py-8 bg-gradient-to-b from-red-100 to-red-200 hover:from-red-200 hover:to-red-300 border-4 border-red-300 rounded-3xl btn-shadow flex flex-col items-center gap-2">
                                <span className="text-7xl">🎤</span>
                                <span className="jua fs-lg text-red-800">목소리로</span>
                                <span className="jua fs-sm text-red-700">녹음하기</span>
                            </button>
                            <button onClick={() => { sfx.click(); setMode('text'); }} className="flex-1 py-8 bg-gradient-to-b from-blue-100 to-blue-200 hover:from-blue-200 hover:to-blue-300 border-4 border-blue-300 rounded-3xl btn-shadow flex flex-col items-center gap-2">
                                <span className="text-7xl">⌨️</span>
                                <span className="jua fs-lg text-blue-800">글자로</span>
                                <span className="jua fs-sm text-blue-700">써보기</span>
                            </button>
                        </div>
                        <button onClick={() => { sfx.click(); onSkip(); }} className="py-3 px-6 bg-white text-slate-500 jua rounded-2xl btn-shadow fs-md">건너뛰기</button>
                    </div>
                </div>
            );

            if (mode === 'text') return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-gradient-to-b from-blue-50 to-cyan-100 p-4 text-center overflow-y-auto custom-sc">
                    <div className="pop w-full flex flex-col items-center gap-4 max-w-2xl">
                        <Fairy mood="happy" cls="scale-100" />
                        <h2 className="fs-2xl jua text-blue-900">⌨️ 다짐 글로 쓰기!</h2>
                        <div className="w-full bg-white/90 rounded-2xl p-4 flex flex-col gap-2 text-left shadow-sm border-2 border-blue-100">
                            <p className="fs-md jua text-blue-700 mb-1">💬 이런 다짐은 어떨까요?</p>
                            {examples.map((ex, i) => (
                                <p key={i} className="fs-md jua text-slate-700 leading-relaxed pl-3 border-l-4 border-blue-300">{ex}</p>
                            ))}
                        </div>
                        <textarea
                            value={textInput}
                            onChange={e => setTextInput(e.target.value)}
                            placeholder="여기에 나의 다짐을 적어보세요!"
                            rows="4"
                            className="w-full p-4 fs-lg jua rounded-2xl border-4 border-blue-200 bg-white outline-none focus:border-blue-400 text-slate-700 transition-colors resize-none leading-relaxed"
                        />
                        <div className="flex gap-2 w-full">
                            <button onClick={() => { sfx.click(); setMode('choose'); setTextInput(''); }} className="py-4 px-4 bg-white text-slate-500 jua rounded-2xl btn-shadow fs-md">← 뒤로</button>
                            <button onClick={submitText} className="flex-1 py-4 bg-blue-500 hover:bg-blue-600 text-white fs-lg jua rounded-2xl btn-shadow">💾 제출하기</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col items-center bg-gradient-to-b from-amber-50 to-yellow-100 p-3 text-center overflow-y-auto custom-sc">
                    <div className="pop w-full flex flex-col items-center gap-3 max-w-2xl mt-2">
                        <h2 className="fs-2xl jua text-amber-900">🎙️ 다짐 녹음하기!</h2>

                        {state === 'idle' && (
                            <>
                                <div className="w-full bg-white rounded-2xl p-3 flex flex-col gap-2 text-left shadow-sm border-3 border-amber-200" style={{borderWidth:'3px'}}>
                                    <p className="fs-md jua text-amber-700">💬 예시 문장 — 클릭하면 읽어줘요!</p>
                                    {examples.map((ex, i) => (
                                        <button
                                            key={i}
                                            onClick={() => { sfx.click(); stopSpeak(); speak(ex); }}
                                            className="text-left fs-md jua text-slate-700 leading-snug pl-3 py-2 border-l-4 border-amber-300 bg-amber-50 hover:bg-amber-100 active:scale-95 rounded-r-xl transition-all flex items-center gap-2">
                                            <span className="text-amber-500">🔊</span>
                                            <span className="flex-1">{ex}</span>
                                        </button>
                                    ))}
                                    <p className="fs-sm jua text-amber-600 mt-1 text-center">👆 듣고 따라 말하면서 녹음해 보세요!</p>
                                </div>
                            </>
                        )}

                        {!sttSupported && state === 'idle' && (
                            <div className="w-full bg-orange-50 border-2 border-orange-200 rounded-2xl p-3 text-left">
                                <p className="fs-sm jua text-orange-800">⚠️ 이 브라우저는 음성→텍스트 변환을 지원하지 않아요. <strong>녹음은 됩니다!</strong> Chrome 권장.</p>
                            </div>
                        )}

                        {(state === 'rec' || state === 'done') && (
                            <div className="w-full bg-white rounded-2xl p-3 flex flex-col gap-2 shadow-sm border-2 border-amber-200">
                                <p className="fs-md jua text-amber-700 text-left flex items-center gap-2">
                                    {state === 'rec' ? <><span className="inline-block w-3 h-3 bg-red-500 rounded-full pulse-anim"></span> 듣고 있어요...</> : '📝 내가 말한 내용 (직접 수정 가능)'}
                                </p>
                                <textarea
                                    value={state === 'rec' ? sttText : editableStt}
                                    onChange={e => {
                                        if (state === 'done') setEditableStt(e.target.value);
                                        else setSttText(e.target.value);
                                    }}
                                    placeholder={state === 'rec' ? "목소리를 들려주세요! 또는 직접 입력해도 돼요" : "여기에 다짐을 적거나 수정해주세요"}
                                    rows="4"
                                    className="w-full p-4 fs-lg jua rounded-xl border-2 border-amber-100 bg-amber-50 outline-none focus:border-amber-400 text-slate-700 resize-none leading-relaxed"
                                />
                            </div>
                        )}

                        {audioUrl && state === 'done' && <audio src={audioUrl} controls className="w-full rounded-xl" />}

                        {state === 'idle' && (
                            <div className="flex gap-2 w-full mt-1">
                                <button onClick={() => { sfx.click(); setMode('choose'); }} className="py-5 px-5 bg-white text-slate-500 jua rounded-2xl btn-shadow fs-md">←</button>
                                <button onClick={start} className="flex-1 py-5 bg-red-500 hover:bg-red-600 text-white fs-xl jua rounded-2xl btn-shadow">🎤 녹음 시작</button>
                            </div>
                        )}
                        {state === 'rec' && (
                            <button onClick={stop} className="w-full py-5 text-white fs-xl jua rounded-2xl btn-shadow blink-red">⏹ 녹음 완료</button>
                        )}
                        {state === 'done' && (
                            <div className="flex gap-2 w-full">
                                <button onClick={start} className="flex-1 py-4 bg-white text-slate-600 jua rounded-2xl btn-shadow fs-md">🔁 다시</button>
                                <button onClick={submitVoice} className="flex-1 py-4 bg-amber-500 hover:bg-amber-600 text-white fs-lg jua rounded-2xl btn-shadow">💾 제출</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        /* 입학 전 체크리스트 */
        const ChecklistPopup = ({ questions, studentNumber, speakerOn, onComplete }) => {
            const [idx, setIdx] = useState(0);
            const [saving, setSaving] = useState(false);
            const bgs = ['from-pink-100 to-pink-200', 'from-blue-100 to-blue-200', 'from-green-100 to-green-200', 'from-orange-100 to-orange-200', 'from-purple-100 to-purple-200'];
            const titles = ['text-pink-900', 'text-blue-900', 'text-green-900', 'text-orange-900', 'text-purple-900'];
            const btns = ['bg-pink-500 hover:bg-pink-600', 'bg-blue-500 hover:bg-blue-600', 'bg-green-500 hover:bg-green-600', 'bg-orange-500 hover:bg-orange-600', 'bg-purple-500 hover:bg-purple-600'];
            const borders = ['border-pink-300', 'border-blue-300', 'border-green-300', 'border-orange-300', 'border-purple-300'];
            const cb = bgs[idx % 5], ct = titles[idx % 5], cn = btns[idx % 5], cbd = borders[idx % 5];
            useEffect(() => () => stopSpeak(), []);
            const ans = async () => {
                sfx.click();
                if (idx < questions.length - 1) { setIdx(idx + 1); return; }
                setSaving(true);
                await api.post({ action: 'markChecklistComplete', studentNumber });
                sfx.complete();
                setSaving(false);
                onComplete();
            };
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-3">
                    <div className={`bg-white w-full rounded-3xl overflow-hidden shadow-2xl pop transition-colors duration-500 max-w-lg border-4 ${cbd}`}>
                        <div className={`bg-gradient-to-b ${cb} p-5 text-center transition-all duration-500`}>
                            <span className={`inline-block bg-white/70 ${ct} fs-sm jua px-3 py-1 rounded-full mb-3`}>
                                📚 입학 전 체크리스트 {idx + 1}/{questions.length}
                            </span>
                            <h2 className={`fs-xl jua ${ct} break-keep leading-relaxed transition-colors duration-500 flex items-center justify-center`} style={{minHeight: '5rem'}}>
                                <HighlightedText text={questions[idx].항목} speakerOn={speakerOn} autoPlay={true} />
                            </h2>
                        </div>
                        <div className="p-5 flex flex-col gap-3">
                            <button disabled={saving} onClick={ans} className={`w-full py-4 fs-lg text-white rounded-2xl jua btn-shadow ${cn} ${saving ? 'opacity-50' : ''}`}>
                                {saving ? '저장 중...' : '✅ 네, 완료했어요!'}
                            </button>
                            <button disabled={saving} onClick={ans} className={`w-full py-4 fs-md bg-slate-100 text-slate-700 rounded-2xl jua btn-shadow ${saving ? 'opacity-50' : ''}`}>
                                💪 아직 준비 중이에요
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ══════════════════════════════════════════════
           ★ MAIN APP ★
        ══════════════════════════════════════════════ */
        function App() {
            const [loading, setLoading] = useState(true);
            const [appData, setAppData] = useState(null);
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('student');

            // 활동 진행 단계: mood → quote → mission → quiz → recording → sticker → done
            const [stage, setStage] = useState('mood');
            const [moodData, setMoodData] = useState(null);
            const [todayQuote, setTodayQuote] = useState('');
            const [missions, setMissions] = useState([]);
            const [missionsResult, setMissionsResult] = useState(null);
            const [textPledge, setTextPledge] = useState('');
            const [audioPledge, setAudioPledge] = useState(null);
            const [earnedSticker, setEarnedSticker] = useState(null);
            const [collectedStickers, setCollectedStickers] = useState([]); // 학번별 누적 (시트에서 읽음)

            const [recordId, setRecordId] = useState(null);
            const [parentSup, setParentSup] = useState('');
            const [parentNote, setParentNote] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [showChecklist, setShowChecklist] = useState(false);
            const [micChecked, setMicChecked] = useState(false);
            const [micStream, setMicStream] = useState(null);
            const [tips, setTips] = useState([]);
            const [parentSubmitted, setParentSubmitted] = useState(false);

            const [speakerOn, setSpeakerOn] = useState(false);
            const [showDebug, setShowDebug] = useState(false);
            const [showCollection, setShowCollection] = useState(false);
            const [activePopup, setActivePopup] = useState(null);
            const [bigSticker, setBigSticker] = useState(false);

            useEffect(() => {
                if ('speechSynthesis' in window) {
                    const load = () => { window.speechSynthesis.getVoices(); };
                    load();
                    window.speechSynthesis.onvoiceschanged = load;
                }
            }, []);

            const pickMissions = (data) => {
                const all = (data.Checklist || []).filter(c => c.카테고리 === '데일리');
                setMissions([...all].sort(() => 0.5 - Math.random()).slice(0, 3));
            };

            const pickTodayQuote = () => {
                // 날짜 기반 → 같은 날 같은 명언
                const dayKey = new Date().toDateString();
                let hash = 0;
                for (let i = 0; i < dayKey.length; i++) hash = ((hash << 5) - hash) + dayKey.charCodeAt(i);
                const idx = Math.abs(hash) % QUOTES.length;
                return QUOTES[idx];
            };

            useEffect(() => {
                const load = async () => {
                    let data = null;
                    if (GAS_URL) data = await api.getData();
                    if (!data) {
                        await new Promise(r => setTimeout(r, 600));
                        data = MOCK;
                    }
                    setAppData(data);
                    if (data.Education && data.Education.length) {
                        const s = [...data.Education].sort(() => 0.5 - Math.random());
                        setTips(s.slice(0, 1));
                    }
                    pickMissions(data);
                    setTodayQuote(pickTodayQuote());
                    setLoading(false);
                };
                load();
            }, []);

            const toggleSpeaker = () => {
                if (speakerOn) {
                    setSpeakerEnabled(false); stopSpeak(); setSpeakerOn(false);
                } else {
                    setSpeakerEnabled(true); setSpeakerOn(true);
                    sfx.click();
                    setTimeout(() => speak('스피커를 켰어요. 이제 문제를 읽어줄게요!'), 200);
                }
            };

            const requestMic = async () => {
                sfx.click();
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                    setMicStream(s);
                } catch (e) {}
                setMicChecked(true);
            };
            const skipMic = () => { sfx.click(); setMicChecked(true); };

            const selectUser = (u) => {
                setUser(u);
                sfx.click();
                if (speakerOn) speak(`${u.이름} 어린이, 환영해요!`);
                
                // 해당 학생의 누적 스티커 계산
                const recs = (appData.Records || []).filter(r => String(r.학번) === String(u.학번));
                const stickerIds = recs
                    .map(r => r.획득스티커)
                    .filter(s => s)
                    .map(s => parseInt(String(s).match(/\d+/)?.[0]))
                    .filter(n => !isNaN(n));
                setCollectedStickers([...new Set(stickerIds)]);

                const ok = (appData.ChecklistStats || []).find(s => String(s.학번) === String(u.학번) && s.완료여부 === '완료');
                if (!ok) setShowChecklist(true);
                setStage('mood'); // 첫 단계로
            };

            // 활동 완료 시 시트 즉시 저장 + 스티커 부여
            const saveStudentNow = async (audioB64, txt, missionRes, mood, quote) => {
                if (!user) return;

                // 랜덤 스티커 부여 (이미 가진 건 제외)
                const remaining = STICKER_POOL.filter(s => !collectedStickers.includes(s.id));
                const sticker = remaining.length > 0 
                    ? remaining[Math.floor(Math.random() * remaining.length)]
                    : STICKER_POOL[Math.floor(Math.random() * STICKER_POOL.length)]; // 다 모았으면 랜덤
                setEarnedSticker(sticker);
                setCollectedStickers([...collectedStickers, sticker.id]);

                const missionResult = missionRes
                    ? missions.map((m, i) => `${m.항목}: ${missionRes[i] === 'good' ? '😃 잘했어요' : '☹️ 아쉬워요'}`).join('\n')
                    : '';
                let audioUrl = '';

                if (GAS_URL) {
                    if (audioB64) {
                        const ar = await api.post({ action: 'uploadAudioToDrive', base64Data: audioB64, filename: `${user.학번}_${user.이름}_${Date.now()}.webm` });
                        if (ar && ar.success) audioUrl = ar.fileUrl;
                        else dbg('ERR', '오디오 업로드 실패', ar);
                    }
                    const record = {
                        studentNumber: user.학번,
                        studentName: user.이름,
                        moodEmoji: mood ? mood.emoji + ' ' + mood.label : '',
                        moodReason: mood ? mood.reason : '',
                        missionResult,
                        todayQuote: quote || '',
                        sticker: `${sticker.id}. ${sticker.emoji} ${sticker.name}`,
                        pledgeText: txt || '',
                        audioUrl,
                    };
                    const sr = await api.post({ action: 'saveStudentRecord', record });
                    if (sr && sr.success) { setRecordId(sr.recordId); sfx.complete(); }
                }
            };

            const resetAll = () => {
                sfx.click(); stopSpeak();
                setUser(null); setMissionsResult(null); setMoodData(null);
                setTextPledge(''); setAudioPledge(null); setEarnedSticker(null);
                setStage('mood');
                setParentSup(''); setParentNote(''); setTab('student'); setParentSubmitted(false);
                setRecordId(null);
                if (appData) { pickMissions(appData); setTodayQuote(pickTodayQuote()); }
            };

            const renderInfoPopup = () => {
                if (!activePopup) return null;
                const close = () => { sfx.click(); setActivePopup(null); stopSpeak(); };

                if (activePopup === 'tips30') {
                    const list = appData.Transition || [];
                    return (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-3 fade-up">
                            <div className="bg-white rounded-3xl shadow-xl w-full max-w-md max-h-[85vh] flex flex-col overflow-hidden">
                                <div className="p-4 bg-gradient-to-r from-indigo-50 to-purple-50 border-b flex justify-between items-center">
                                    <h2 className="jua fs-md text-indigo-900">🏫 초등학교 생활 꿀팁 ({list.length}개)</h2>
                                    <button onClick={close} className="bg-white text-slate-500 px-3 py-1 rounded-full shadow-sm fs-sm jua">닫기</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-3 space-y-3 custom-sc">
                                    {list.length === 0 && (
                                        <div className="text-center py-8 text-slate-400 jua fs-md">
                                            데이터를 불러올 수 없어요.<br/>
                                            🛠 연결 진단으로 확인해주세요.
                                        </div>
                                    )}
                                    {list.map((q, i) => {
                                        // 시트 컬럼명이 다를 수 있어 fallback 처리
                                        const question = q.질문 || q.Q || q.question || '';
                                        const answer = q.답변 || q.A || q.answer || '';
                                        const category = q.카테고리 || q.category || '';
                                        return (
                                            <div key={i} className="flex flex-col gap-2 p-3 bg-white rounded-2xl shadow-sm border-2 border-indigo-50">
                                                <div className="flex gap-2 items-start">
                                                    <span className="text-indigo-500 jua fs-md shrink-0">Q{i+1}.</span>
                                                    <span className="jua text-indigo-900 fs-md flex-1">{question}</span>
                                                </div>
                                                {answer && (
                                                    <div className="flex gap-2 items-start ml-2 mt-1 pt-2 border-t border-slate-100">
                                                        <span className="text-amber-500 jua fs-md shrink-0">A.</span>
                                                        <span className="jua text-slate-700 fs-md leading-relaxed flex-1">{answer}</span>
                                                    </div>
                                                )}
                                                {category && (
                                                    <span className="self-start text-xs jua bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full mt-1">{category}</span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    );
                }

                if (activePopup === 'eduTips') return (
                    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-3 fade-up">
                        <div className="bg-white rounded-3xl shadow-xl w-full max-w-md max-h-[85vh] flex flex-col overflow-hidden">
                            <div className="p-4 bg-gradient-to-r from-blue-50 to-cyan-50 border-b flex justify-between items-center">
                                <h2 className="jua fs-md text-blue-900">💡 오늘의 가정 연계 교육 팁</h2>
                                <button onClick={close} className="bg-white text-slate-500 px-3 py-1 rounded-full shadow-sm fs-sm jua">닫기</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-3 custom-sc">
                                {tips.map((t, i) => (
                                    <div key={i} className="border-l-4 border-blue-400 pl-4 py-2">
                                        <h4 className="jua text-blue-900 mb-2 fs-md">{t.제목}</h4>
                                        <p className="jua fs-md text-slate-700 leading-relaxed bg-blue-50 p-3 rounded-xl">{t.내용}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );

                if (activePopup === 'site') return (
                    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-3 fade-up">
                        <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm flex flex-col overflow-hidden text-center pop">
                            <div className="p-5 bg-gradient-to-b from-emerald-50 to-green-100 flex flex-col items-center gap-2">
                                <span className="text-5xl mb-1 bob">🌱</span>
                                <h2 className="jua fs-lg text-emerald-900">유초이음 사이트</h2>
                                <p className="jua text-emerald-700 fs-sm">입학을 앞둔 우리 아이들을 위한<br/>다양한 정보가 가득해요!</p>
                            </div>
                            <div className="p-5 flex flex-col gap-2">
                                <a href="https://www.parents.go.kr/usr/wap/list.do?app=10210&listType=thumb&ctgryCodeSearch=1&nttSjSearchOr=&searchField=&searchText=" target="_blank" rel="noopener noreferrer" onClick={() => sfx.click()} className="py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl jua fs-md w-full btn-shadow">새 창으로 이동 →</a>
                                <button onClick={close} className="py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl jua fs-sm w-full">닫기</button>
                            </div>
                        </div>
                    </div>
                );
                return null;
            };

            // 로딩
            if (loading) return <div className="app-frame"><Spinner text="데이터 불러오는 중..." /></div>;
            if (isSaving) return <div className="app-frame"><Spinner text="기록 저장 중..." /></div>;

            // 마이크
            if (!micChecked) return (
                <div className="app-frame">
                    <div className="h-full w-full flex flex-col items-center justify-center p-5 text-center bg-gradient-to-b from-blue-50 to-blue-100 overflow-y-auto custom-sc">
                        <Fairy mood="happy" cls="mb-3 scale-110" />
                        <h1 className="fs-2xl jua text-blue-900 mb-3">🎤 마이크 준비하기</h1>
                        <p className="fs-md jua text-blue-700 mb-6 leading-relaxed px-4 max-w-md">
                            내 목소리로 다짐을 남기기 위해<br />마이크가 필요해요!
                        </p>
                        <div className="w-full max-w-md flex flex-col gap-3">
                            <button onClick={requestMic} className="w-full py-5 fs-lg bg-blue-500 hover:bg-blue-600 text-white rounded-2xl jua btn-shadow">🎤 허용하고 시작하기</button>
                            <button onClick={skipMic} className="w-full py-4 fs-md bg-white text-slate-500 rounded-2xl jua border-2 border-slate-200">마이크 없이 계속하기</button>
                        </div>
                        <p className="fs-sm text-slate-500 mt-4 break-keep px-4 jua">마이크 없어도 체크리스트·퀴즈는 이용할 수 있어요!</p>
                    </div>
                </div>
            );

            // 사용자 선택
            if (!user) return (
                <div className="app-frame">
                    <div className="h-full w-full flex flex-col items-center justify-center p-5 bg-gradient-to-b from-amber-50 via-pink-50 to-amber-100 overflow-y-auto custom-sc">
                        <Fairy mood="happy" cls="mb-3 scale-110" />
                        <h1 className="fs-2xl jua text-amber-800 mb-2 text-center">유초이음 적응 앱</h1>
                        <p className="jua text-amber-600 fs-md mb-6">🌟 3주간 한 뼘 자라는 우리 🌟</p>
                        <div className="w-full max-w-md bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-xl border-4 border-amber-200">
                            <p className="text-center fs-md text-slate-600 jua mb-4">👋 누가 접속했나요?</p>
                            <select
                                className="w-full p-4 rounded-2xl border-amber-300 bg-amber-50 jua text-slate-700 fs-lg outline-none focus:border-amber-500 cursor-pointer"
                                style={{borderWidth: '3px'}}
                                defaultValue=""
                                onChange={e => {
                                    const f = appData.Students.find(s => String(s.학번) === String(e.target.value));
                                    if (f) selectUser(f);
                                }}>
                                <option value="" disabled>-- 학생 선택 --</option>
                                {appData.Students.map((s, i) => (
                                    <option key={s.학번} value={s.학번}>{i + 1}번 {s.이름}</option>
                                ))}
                            </select>
                            <p className="text-center text-slate-400 fs-sm mt-3 jua">번호를 눌러 친구를 찾아보세요</p>
                        </div>
                        <button onClick={() => { sfx.click(); setShowDebug(true); }} className="mt-4 fs-sm text-slate-400 underline opacity-60 jua">🛠 연결 진단</button>
                    </div>
                    {showDebug && <DebugPanel onClose={() => setShowDebug(false)} />}
                </div>
            );

            const preEnroll = appData.Checklist.filter(c => c.카테고리 === '입학전');
            if (showChecklist && preEnroll.length > 0) return (
                <div className="app-frame">
                    <ChecklistPopup questions={preEnroll} studentNumber={user.학번} speakerOn={speakerOn} onComplete={() => {
                        setAppData({ ...appData, ChecklistStats: [...(appData.ChecklistStats || []), { 학번: user.학번, 완료여부: '완료' }] });
                        setShowChecklist(false);
                    }} />
                </div>
            );

            // 활동 단계 분기
            if (stage === 'mood') return (
                <div className="app-frame">
                    <MoodCheckScreen studentName={user.이름} speakerOn={speakerOn} onDone={(m) => { setMoodData(m); setStage('quote'); }} />
                </div>
            );

            if (stage === 'quote') return (
                <div className="app-frame">
                    <QuoteScreen quote={todayQuote} speakerOn={speakerOn} onDone={() => setStage('mission')} />
                </div>
            );

            if (stage === 'mission') return (
                <div className="app-frame">
                    <MissionPopup missions={missions} speakerOn={speakerOn} onComplete={r => { setMissionsResult(r); setStage('quiz'); }} />
                </div>
            );

            if (stage === 'quiz') return (
                <div className="app-frame">
                    <QuizPopup speakerOn={speakerOn} onComplete={() => setStage('recording')} />
                </div>
            );

            if (stage === 'recording') return (
                <div className="app-frame">
                    <RecordingScreen
                        providedStream={micStream}
                        speakerOn={speakerOn}
                        onDone={async (audioB64, txt) => {
                            setAudioPledge(audioB64); setTextPledge(txt || '');
                            setIsSaving(true);
                            await saveStudentNow(audioB64, txt, missionsResult, moodData, todayQuote);
                            setIsSaving(false);
                            setStage('sticker');
                        }}
                        onSkip={async () => {
                            setIsSaving(true);
                            await saveStudentNow(null, '', missionsResult, moodData, todayQuote);
                            setIsSaving(false);
                            setStage('sticker');
                        }}
                    />
                </div>
            );

            if (stage === 'sticker' && earnedSticker) return (
                <div className="app-frame">
                    <StickerRewardScreen sticker={earnedSticker} speakerOn={speakerOn} onDone={() => setStage('done')} />
                </div>
            );

            if (stage === 'done') return (
                <div className="app-frame">
                    {bigSticker && <StickerBurst stickers={['🎉','✨','💖','🌟','👍','🏆']} />}
                    {renderInfoPopup()}
                    {showCollection && <StickerCollectionPopup collected={collectedStickers} onClose={() => { sfx.click(); setShowCollection(false); }} />}

                    <header className="bg-white px-3 py-2 flex items-center justify-between shadow-sm flex-shrink-0 border-b-2 border-amber-100">
                        <div className="flex items-center gap-1">
                            <Fairy cls="scale-50 -ml-3 -my-5 shrink-0" />
                            <h1 className="fs-md jua text-amber-800 -ml-1">유초이음</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => { sfx.click(); setShowCollection(true); }} className="px-3 h-10 rounded-full bg-amber-100 text-amber-800 jua fs-sm flex items-center gap-1">
                                🏅 {collectedStickers.length}/15
                            </button>
                            <button onClick={toggleSpeaker} className={"w-10 h-10 rounded-full jua text-xl transition-all flex items-center justify-center " + (speakerOn ? 'bg-blue-100 text-blue-600 speaker-on-glow' : 'bg-slate-100 text-slate-400')}>
                                {speakerOn ? '🔊' : '🔇'}
                            </button>
                            <div className="fs-sm jua bg-amber-100 text-amber-800 px-3 py-1 rounded-full">
                                {user.이름}
                            </div>
                            <button onClick={() => { sfx.click(); setShowDebug(true); }} className="w-10 h-10 rounded-full bg-slate-200 text-slate-600 text-base flex items-center justify-center">🛠</button>
                        </div>
                    </header>

                    <div className="flex px-3 pt-2 pb-2 gap-2 bg-slate-50 flex-shrink-0">
                        <button onClick={() => { sfx.click(); setTab('student'); }} className={"flex-1 py-3 rounded-xl jua fs-md flex items-center justify-center gap-1 " + (tab === 'student' ? 'bg-amber-400 text-amber-900 shadow-md' : 'bg-white text-slate-400')}>
                            😊 아이 활동
                        </button>
                        <button onClick={() => { sfx.click(); setTab('parent'); }} className={"flex-1 py-3 rounded-xl jua fs-md flex items-center justify-center gap-1 " + (tab === 'parent' ? 'bg-blue-400 text-blue-900 shadow-md' : 'bg-white text-slate-400')}>
                            👨‍👩‍👧 학부모님
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-sc p-3">
                        {tab === 'student' && (
                            <div className="fade-up flex flex-col gap-3 max-w-2xl mx-auto w-full">
                                <div className="bg-gradient-to-b from-green-50 to-yellow-50 p-5 rounded-3xl border-4 border-green-200 text-center">
                                    <div className="text-7xl mb-2 bob inline-block">🏆</div>
                                    <h2 className="fs-2xl jua rainbow-text mb-2">오늘의 활동 완료!</h2>
                                    <p className="jua fs-lg text-green-700 mb-2">
                                        <span className="text-green-500 fs-2xl jua">{user.이름}</span> 어린이, 참 잘했어요! 👍
                                    </p>
                                    {moodData && (
                                        <div className="bg-white rounded-2xl p-3 mb-2 inline-flex items-center gap-2">
                                            <span className="text-3xl">{moodData.emoji}</span>
                                            <span className="jua fs-md text-slate-700">{moodData.label}</span>
                                        </div>
                                    )}
                                    {earnedSticker && (
                                        <div className="bg-white rounded-2xl p-3 mb-3">
                                            <p className="jua fs-sm text-amber-700 mb-1">오늘 받은 스티커</p>
                                            <span className="text-5xl">{earnedSticker.emoji}</span>
                                            <p className="jua fs-md text-amber-800">{earnedSticker.name}</p>
                                        </div>
                                    )}
                                </div>

                                <button onClick={() => { sfx.click(); setShowCollection(true); }} className="bg-gradient-to-r from-amber-100 to-pink-100 p-4 rounded-2xl border-2 border-amber-200 flex items-center gap-3 btn-shadow active:scale-95">
                                    <div className="text-4xl">🏅</div>
                                    <div className="text-left flex-1">
                                        <p className="jua fs-md text-amber-900">내 스티커 수집장 보기</p>
                                        <p className="jua fs-sm text-amber-600">{collectedStickers.length} / 15 개 모았어요!</p>
                                    </div>
                                    <span className="bg-amber-500 text-white px-3 py-1 rounded-full jua fs-xs">열기 →</span>
                                </button>

                                <button onClick={resetAll} className="py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl jua fs-lg btn-shadow">
                                    🔁 처음 화면으로
                                </button>
                            </div>
                        )}

                        {tab === 'parent' && (
                            <div className="fade-up flex flex-col gap-3 max-w-2xl mx-auto w-full">
                                <div className="bg-blue-50 rounded-2xl p-4 text-center border-2 border-blue-200">
                                    <p className="jua fs-md text-blue-800 mb-1">💡 학부모 활동은 선택이에요</p>
                                    <p className="jua fs-sm text-blue-600">아이의 기록은 이미 저장됐어요!</p>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border-t-4 border-blue-400 p-4 flex flex-col gap-3">
                                    <h2 className="jua text-blue-900 fs-md leading-snug">
                                        👨‍👩‍👧 아이가 학교생활에 잘 적응하도록 돕고 계신가요?
                                    </h2>
                                    <div className="flex gap-2">
                                        <button onClick={() => { sfx.click(); setParentSup('잘 돕고 있음'); }}
                                            className={"flex-1 py-3 jua rounded-xl fs-sm " + (parentSup === '잘 돕고 있음' ? 'bg-blue-500 text-white shadow' : 'bg-slate-100 text-slate-600')}>
                                            👍 잘 돕고 있어요
                                        </button>
                                        <button onClick={() => { sfx.click(); setParentSup('더 노력할 예정'); }}
                                            className={"flex-1 py-3 jua rounded-xl fs-sm " + (parentSup === '더 노력할 예정' ? 'bg-orange-400 text-white shadow' : 'bg-slate-100 text-slate-600')}>
                                            💪 도움이 필요해요
                                        </button>
                                    </div>
                                    <textarea value={parentNote} onChange={e => setParentNote(e.target.value)}
                                        className="p-4 fs-md jua rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-blue-400 text-slate-700 resize-none min-h-[6rem] leading-relaxed"
                                        rows="3"
                                        placeholder="가정에서 느낀 점을 자유롭게 적어주세요." />

                                    {!parentSubmitted ? (
                                        <button disabled={isSaving} onClick={async () => {
                                            setIsSaving(true);
                                            if (GAS_URL && recordId) {
                                                const r = await api.post({ action: 'updateParentRecord', recordId, parentStatus: parentSup, parentNote });
                                                if (r && r.success) sfx.complete();
                                                else { alert('학부모 소감 저장 실패: ' + (r && r.error ? r.error : '알 수 없는 오류')); setIsSaving(false); return; }
                                            }
                                            setIsSaving(false);
                                            setParentSubmitted(true);
                                            setBigSticker(true);
                                            setTimeout(() => setBigSticker(false), 1700);
                                        }} className={"py-3 fs-md text-white rounded-xl jua btn-shadow " + (isSaving ? 'bg-slate-400' : 'bg-blue-600 hover:bg-blue-700')}>
                                            📤 제출하기 (선택)
                                        </button>
                                    ) : (
                                        <div className="bg-green-100 text-green-800 jua fs-sm py-3 rounded-xl text-center border-2 border-green-200">
                                            ✅ 소감 제출 완료!
                                        </div>
                                    )}
                                </div>

                                <div className="flex flex-col gap-2">
                                    <p className="text-center text-slate-500 jua fs-sm">🔍 참고 자료 보기</p>
                                    <button onClick={() => { sfx.click(); setActivePopup('tips30'); }} className="w-full bg-indigo-50 hover:bg-indigo-100 active:scale-95 border-2 border-indigo-200 rounded-2xl flex items-center justify-between px-4 py-3">
                                        <span className="jua text-indigo-900 fs-md">🏫 초등학교 생활 꿀팁 30선</span>
                                        <span className="bg-indigo-500 text-white px-3 py-1 rounded-full jua fs-xs">열기</span>
                                    </button>
                                    <button onClick={() => { sfx.click(); setActivePopup('eduTips'); }} className="w-full bg-blue-50 hover:bg-blue-100 active:scale-95 border-2 border-blue-200 rounded-2xl flex items-center justify-between px-4 py-3">
                                        <span className="jua text-blue-900 fs-md">💡 가정 연계 교육 팁</span>
                                        <span className="bg-blue-500 text-white px-3 py-1 rounded-full jua fs-xs">열기</span>
                                    </button>
                                    <button onClick={() => { sfx.click(); setActivePopup('site'); }} className="w-full bg-emerald-50 hover:bg-emerald-100 active:scale-95 border-2 border-emerald-200 rounded-2xl flex items-center justify-between px-4 py-3">
                                        <span className="jua text-emerald-900 fs-md">🌱 유초이음 활용 사이트</span>
                                        <span className="bg-emerald-500 text-white px-3 py-1 rounded-full jua fs-xs">열기</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ErrBound><App /></ErrBound>);
    </script>
</body>

</html>
