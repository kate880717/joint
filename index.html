<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>유초이음 학교생활 적응 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Nanum Gothic', 'Jua', sans-serif;
            font-weight: 700;
            background: #ffffff;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }
        #root {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .app-frame {
            width: 100%;
            height: 100%;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .jua { font-family: 'Jua', 'Nanum Gothic', sans-serif; }
        .ngo { font-family: 'Nanum Gothic', sans-serif; font-weight: 800; }

        .custom-sc::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-sc::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 10px; }
        .custom-sc::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-sc { scrollbar-width: thin; scrollbar-color: #cbd5e1 rgba(0,0,0,0.02); }

        :root {
            --fs-xs: clamp(0.85rem, 1.4vmin, 1.05rem);
            --fs-sm: clamp(1rem, 1.8vmin, 1.3rem);
            --fs-md: clamp(1.2rem, 2.4vmin, 1.65rem);
            --fs-lg: clamp(1.45rem, 3vmin, 2.1rem);
            --fs-xl: clamp(1.8rem, 3.8vmin, 2.6rem);
            --fs-2xl: clamp(2.2rem, 4.8vmin, 3.3rem);
            --fs-3xl: clamp(2.7rem, 6vmin, 4.2rem);
        }
        .fs-xs { font-size: var(--fs-xs); }
        .fs-sm { font-size: var(--fs-sm); }
        .fs-md { font-size: var(--fs-md); }
        .fs-lg { font-size: var(--fs-lg); }
        .fs-xl { font-size: var(--fs-xl); }
        .fs-2xl { font-size: var(--fs-2xl); }
        .fs-3xl { font-size: var(--fs-3xl); }

        @keyframes fade-up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fade-up .3s ease-out both; }

        @keyframes pop { from { opacity:0; transform:scale(.7); } to { opacity:1; transform:scale(1); } }
        .pop { animation: pop .35s cubic-bezier(.34,1.56,.64,1) both; }

        @keyframes bob { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
        .bob { animation: bob 2s ease-in-out infinite; }

        @keyframes wiggle {
            0%,100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        .wiggle { animation: wiggle 1.5s ease-in-out infinite; }

        @keyframes spin { to { transform:rotate(360deg); } }
        .spin-anim { animation: spin .9s linear infinite; }

        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
        .pulse-anim { animation: pulse 1.6s ease-in-out infinite; }

        @keyframes blink-red {
            0%,100% { background:#ef4444; box-shadow:0 0 0 0 rgba(239,68,68,.7); }
            50% { background:#dc2626; box-shadow:0 0 0 12px rgba(239,68,68,0); }
        }
        .blink-red { animation: blink-red 1.4s ease-out infinite; }

        @keyframes confetti-fall {
            0% { transform: translate(0,0) rotate(0deg) scale(0); opacity: 1; }
            15% { transform: translate(var(--tx-mid),var(--ty-mid)) rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: translate(var(--tx),var(--ty)) rotate(720deg) scale(.5); opacity: 0; }
        }
        .confetti {
            position: absolute;
            top: 50%; left: 50%;
            font-size: clamp(2rem, 4vmin, 3.5rem);
            pointer-events: none;
            animation: confetti-fall 1.6s cubic-bezier(.4,.7,.7,1) forwards;
            z-index: 100;
        }

        .tts-highlight {
            background: linear-gradient(120deg, #fde68a 0%, #fcd34d 100%);
            border-radius: 4px;
            padding: 0 3px;
            margin: 0 1px;
            transition: background .15s ease;
        }
        .tts-word { transition: all .15s ease; }

        .btn-shadow {
            box-shadow: 0 6px 0 rgba(0,0,0,0.1), 0 8px 16px rgba(0,0,0,0.08);
            transition: all .15s ease;
        }
        .btn-shadow:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.08);
        }

        .speaker-on-glow {
            box-shadow: 0 0 0 3px rgba(96,165,250,.4), 0 4px 12px rgba(96,165,250,.3);
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f59e0b' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.5em;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            padding-right: 3rem !important;
        }
        select option { font-family: 'Jua', sans-serif; padding: 8px; }

        .rainbow-text {
            background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxcgilhwhUVIC-E_rUFZj2lqMC-JUWs_VjdQWKNy-DmG-qNuzffSSDya9nsVcD6lYtcYQ/exec';

        /* 디버그 로그 */
        const debugLogs = [];
        const debugListeners = [];
        const dbg = (type, msg, data) => {
            const entry = { time: new Date().toLocaleTimeString('ko-KR'), type, msg, data };
            debugLogs.push(entry);
            if (debugLogs.length > 50) debugLogs.shift();
            debugListeners.forEach(fn => fn([...debugLogs]));
            console.log(`[${type}]`, msg, data || '');
        };

        /* API */
        const api = {
            async getData() {
                if (!GAS_URL) { dbg('WARN', 'GAS_URL 미설정'); return null; }
                dbg('GET', 'getData 요청');
                try {
                    const res = await fetch(GAS_URL, { redirect: 'follow' });
                    dbg('GET', `응답: ${res.status}`);
                    const text = await res.text();
                    try {
                        const json = JSON.parse(text);
                        dbg('GET', '성공', { keys: Object.keys(json) });
                        return json;
                    } catch(e) { dbg('ERR', 'JSON 파싱 실패', { preview: text.slice(0, 200) }); return null; }
                } catch (e) { dbg('ERR', '네트워크 오류', e.toString()); return null; }
            },
            async post(payload) {
                if (!GAS_URL) return { success: true, mock: true };
                dbg('POST', `요청: ${payload.action}`, payload);
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload),
                        redirect: 'follow'
                    });
                    dbg('POST', `응답: ${res.status}`);
                    const text = await res.text();
                    try {
                        const json = JSON.parse(text);
                        dbg('POST', `${payload.action} 결과`, json);
                        return json;
                    } catch(e) { dbg('ERR', 'POST JSON 파싱 실패', { preview: text.slice(0, 200) }); return { success: false }; }
                } catch (e) { dbg('ERR', 'POST 네트워크 오류', e.toString()); return { success: false }; }
            }
        };

        /* TTS */
        let cachedVoice = null;
        const pickKoreanVoice = () => {
            if (cachedVoice) return cachedVoice;
            const voices = window.speechSynthesis.getVoices();
            if (!voices.length) return null;

            let v = voices.find(x => x.lang === 'ko-KR' && x.name.toLowerCase().includes('google') && !x.localService);
            if (v) { cachedVoice = v; dbg('TTS', '🌟 Google 클라우드 음성', v.name); return v; }

            v = voices.find(x => x.lang === 'ko-KR' && /wavenet|neural|premium|enhanced|natural/i.test(x.name));
            if (v) { cachedVoice = v; dbg('TTS', '🌟 자연 음성', v.name); return v; }

            v = voices.find(x => x.lang === 'ko-KR' && x.name.toLowerCase().includes('google'));
            if (v) { cachedVoice = v; dbg('TTS', 'Google 로컬', v.name); return v; }

            v = voices.find(x => x.lang.startsWith('ko') && /female|woman|여/i.test(x.name));
            if (v) { cachedVoice = v; dbg('TTS', '한국어 여성', v.name); return v; }

            v = voices.find(x => x.lang.startsWith('ko'));
            if (v) { cachedVoice = v; dbg('TTS', '한국어', v.name); return v; }

            return voices[0];
        };

        const speak = (text, opts = {}) => {
            return new Promise((resolve) => {
                if (!('speechSynthesis' in window)) { resolve(); return; }
                window.speechSynthesis.cancel();
                const utt = new SpeechSynthesisUtterance(text);
                const voice = pickKoreanVoice();
                if (voice) utt.voice = voice;
                utt.lang = 'ko-KR';
                utt.pitch = opts.pitch ?? 1.0;
                utt.rate = opts.rate ?? 0.95;
                utt.volume = opts.volume ?? 1.0;
                utt.onend = () => resolve();
                utt.onerror = () => resolve();
                if (opts.onBoundary) utt.onboundary = opts.onBoundary;
                window.speechSynthesis.speak(utt);
            });
        };
        const stopSpeak = () => { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); };

        /* 효과음 */
        let audioCtx = null;
        let speakerEnabled = false; // 스피커 상태 (효과음/TTS 공통 게이트)
        const setSpeakerEnabled = (v) => { speakerEnabled = v; };
        const getAudio = () => {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch(e) { return null; }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        };
        const playTone = (freq, dur, type='sine', vol=0.15) => {
            if (!speakerEnabled) return; // 스피커 OFF면 무음
            const ctx = getAudio();
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + dur);
        };
        const sfx = {
            click: () => playTone(800, 0.08, 'sine', 0.1),
            correct: () => {
                playTone(523, 0.12, 'sine', 0.15);
                setTimeout(() => playTone(659, 0.12, 'sine', 0.15), 100);
                setTimeout(() => playTone(784, 0.2, 'sine', 0.15), 200);
            },
            wrong: () => {
                playTone(300, 0.15, 'sawtooth', 0.1);
                setTimeout(() => playTone(200, 0.25, 'sawtooth', 0.1), 150);
            },
            complete: () => {
                playTone(523, 0.1, 'sine', 0.15);
                setTimeout(() => playTone(659, 0.1, 'sine', 0.15), 100);
                setTimeout(() => playTone(784, 0.1, 'sine', 0.15), 200);
                setTimeout(() => playTone(1047, 0.3, 'sine', 0.15), 300);
            },
            sparkle: () => {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => playTone(1200 + i*300, 0.08, 'sine', 0.1), i*60);
                }
            }
        };

        /* 칭찬 스티커 */
        const StickerBurst = ({ stickers = ['⭐','🌟','💖','🎉','🌈','✨','🎀','🌸'], onDone }) => {
            const [items] = useState(() => {
                const out = [];
                for (let i = 0; i < 18; i++) {
                    const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.4;
                    const dist = 200 + Math.random() * 180;
                    out.push({
                        emoji: stickers[Math.floor(Math.random() * stickers.length)],
                        tx: Math.cos(angle) * dist + 'px',
                        ty: Math.sin(angle) * dist + 'px',
                        txMid: Math.cos(angle) * (dist*0.4) + 'px',
                        tyMid: Math.sin(angle) * (dist*0.4) - 30 + 'px',
                        delay: Math.random() * 0.2
                    });
                }
                return out;
            });
            useEffect(() => {
                sfx.sparkle();
                const t = setTimeout(() => onDone && onDone(), 1700);
                return () => clearTimeout(t);
            }, []);
            return (
                <div className="fixed inset-0 pointer-events-none z-[200]">
                    {items.map((it, i) => (
                        <span key={i} className="confetti" style={{
                            '--tx': it.tx, '--ty': it.ty,
                            '--tx-mid': it.txMid, '--ty-mid': it.tyMid,
                            animationDelay: it.delay + 's'
                        }}>{it.emoji}</span>
                    ))}
                </div>
            );
        };

        /* TTS 따라 읽기 */
        const HighlightedText = ({ text, speakerOn, autoPlay = false, onDone, className = '' }) => {
            const [hlIdx, setHlIdx] = useState(-1);
            const playingRef = useRef(false);

            const play = useCallback(async () => {
                if (!speakerOn) { onDone && onDone(); return; }
                if (playingRef.current) return;
                playingRef.current = true;
                stopSpeak();
                let wordIdx = -1;
                await speak(text, {
                    onBoundary: (e) => {
                        if (e.name === 'word') {
                            wordIdx++;
                            setHlIdx(wordIdx);
                        }
                    }
                });
                setHlIdx(-1);
                playingRef.current = false;
                onDone && onDone();
            }, [text, speakerOn, onDone]);

            useEffect(() => {
                if (autoPlay && speakerOn) {
                    const t = setTimeout(play, 300);
                    return () => { clearTimeout(t); stopSpeak(); };
                }
                if (autoPlay && !speakerOn) onDone && onDone();
            }, [autoPlay, speakerOn]);

            const words = text.split(/(\s+)/);
            let wIdx = -1;
            return (
                <span className={className}>
                    {words.map((w, i) => {
                        if (/^\s+$/.test(w)) return <span key={i}>{w}</span>;
                        wIdx++;
                        const isHl = wIdx === hlIdx;
                        return (
                            <span key={i} className={"tts-word " + (isHl ? 'tts-highlight' : '')}>
                                {w}
                            </span>
                        );
                    })}
                </span>
            );
        };

        /* 샘플 데이터 */
        const MOCK = {
            Students: [{ 학번: '10101', 이름: '새싹이' }, { 학번: '10102', 이름: '김철수' }, { 학번: '10103', 이름: '이영희' }],
            Education: [
                { 제목: '우유팩 혼자 열기 연습', 내용: '학교 급식시간에 우유를 스스로 열 수 있도록 집에서 미리 연습시켜주세요!' },
            ],
            Checklist: [
                { 항목: '취학 전 필수 예방접종을 모두 마쳤나요?', 카테고리: '입학전' },
                { 항목: '학교 가는 길을 안전하게 걸어보는 연습을 했나요?', 카테고리: '입학전' },
                { 항목: '화장실에 혼자 다녀오고 스스로 뒷정리를 할 수 있나요?', 카테고리: '입학전' },
                { 항목: '내 필통과 학용품에 이름표를 모두 붙였나요?', 카테고리: '입학전' },
                { 항목: '외투나 신발을 스스로 입고 벗을 수 있나요?', 카테고리: '입학전' },
                { 항목: '아침에 스스로 일어났나요?', 카테고리: '데일리' },
                { 항목: '알림장을 스스로 확인했나요?', 카테고리: '데일리' },
                { 항목: '화장실 다녀와서 손 씻었나요?', 카테고리: '데일리' },
                { 항목: '내 자리를 정돈했나요?', 카테고리: '데일리' },
                { 항목: '선생님께 웃으며 인사했나요?', 카테고리: '데일리' },
            ],
            Transition: [
                { 질문: '준비물을 혼자 챙기게 도와주고 싶은데 어떻게 할까요?', 답변: '첫 달은 부모님이 함께 챙기고, 이후엔 아이가 먼저 챙기게 한 뒤 최종 검토만 해주세요.', 카테고리: '자립' },
            ],
            ChecklistStats: [],
            Records: []
        };

        class ErrBound extends React.Component {
            constructor(p) { super(p); this.state = { err: null }; }
            static getDerivedStateFromError(e) { return { err: e }; }
            render() {
                if (this.state.err) return (
                    <div className="p-8 bg-red-50 h-full">
                        <h1 className="text-xl font-bold text-red-600 mb-3">오류가 발생했어요</h1>
                        <pre className="text-xs text-red-800 bg-white p-4 rounded-xl whitespace-pre-wrap">{this.state.err.toString()}</pre>
                    </div>
                );
                return this.props.children;
            }
        }

        const Fairy = ({ mood = 'happy', cls = '' }) => (
            <div className={"inline-block bob " + cls}>
                <svg width="100" height="120" viewBox="0 0 120 150" fill="none">
                    <path d="M45 60C40 30 30 10 45 10C55 10 55 40 50 60" fill="#FAF089" stroke="#B7791F" strokeWidth="2" />
                    <path d="M75 60C80 30 90 10 75 10C65 10 65 40 70 60" fill="#FAF089" stroke="#B7791F" strokeWidth="2" />
                    <ellipse cx="60" cy="80" rx="35" ry="30" fill="#FFFFF0" stroke="#B7791F" strokeWidth="2" />
                    <circle cx="50" cy="75" r="3.5" fill="#2D3748" />
                    <circle cx="70" cy="75" r="3.5" fill="#2D3748" />
                    <circle cx="51" cy="74" r="1.2" fill="white" />
                    <circle cx="71" cy="74" r="1.2" fill="white" />
                    {mood === 'happy'
                        ? <path d="M53 90C56 94 64 94 67 90" stroke="#B7791F" strokeWidth="2.5" strokeLinecap="round" fill="none" />
                        : <path d="M53 94C56 90 64 90 67 94" stroke="#B7791F" strokeWidth="2.5" strokeLinecap="round" fill="none" />}
                    <circle cx="45" cy="84" r="4" fill="#F687B3" opacity=".55" />
                    <circle cx="75" cy="84" r="4" fill="#F687B3" opacity=".55" />
                    <path d="M40 105C30 130 90 130 80 105" fill="#9AE6B4" stroke="#2F855A" strokeWidth="2" />
                </svg>
            </div>
        );

        const Spinner = ({ text }) => (
            <div className="h-full w-full flex flex-col items-center justify-center bg-amber-50">
                <svg className="spin-anim text-amber-400 mb-4" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                </svg>
                <p className="text-amber-800 jua fs-xl pulse-anim">{text}</p>
            </div>
        );

        const DebugPanel = ({ onClose }) => {
            const [logs, setLogs] = useState([...debugLogs]);
            useEffect(() => {
                const fn = (l) => setLogs(l);
                debugListeners.push(fn);
                return () => { const i = debugListeners.indexOf(fn); if (i >= 0) debugListeners.splice(i, 1); };
            }, []);

            const testGet = async () => { dbg('TEST', '🔍 GET 테스트'); await api.getData(); };
            const testPost = async () => {
                dbg('TEST', '🔍 POST 테스트');
                await api.post({ action: 'saveCumulativeRecord', record: { studentNumber: 'TEST', studentName: '테스트', type: '연결테스트', content: '디버그 테스트 ' + new Date().toLocaleString(), reflection: '' } });
            };

            const colorOf = (t) => ({ ERR: '#fca5a5', WARN: '#fdba74', GET: '#93c5fd', POST: '#c4b5fd', TEST: '#86efac', TTS: '#f9a8d4', MIC: '#fcd34d', MOCK: '#cbd5e1' }[t] || '#e2e8f0');

            return (
                <div className="fixed inset-0 bg-slate-900/70 z-[300] flex items-center justify-center p-3">
                    <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col overflow-hidden">
                        <div className="bg-slate-800 text-white p-3 flex justify-between items-center">
                            <div className="ngo flex items-center gap-2 text-base">🛠 연결 진단 패널</div>

                    sfx.wrong();

        /* 녹음 + 텍스트 입력 + 실시간 음성→텍스트 변환 */

            useEffect(() => {
                if (speakerOn && mode === 'choose') speak('어떻게 다짐을 남길지 골라볼까요?');
                return () => {
                    stopSpeak();
                    if (recognitionRef.current) {
                        try { recognitionRef.current.stop(); } catch(e) {}

            const examples = [
                "나는 학교 가기 전에 스스로 가방을 챙길 거에요!",

                "나는 급식을 골고루 남기지 않고 먹을 거에요!",
                "나는 복도에서 조용히 걸어 다닐 거에요!",
            ];

            const startSTT = () => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) {
                    dbg('STT', '⚠️ SpeechRecognition 미지원 브라우저');
                    return;
                }
                try {
                    const r = new SR();
                    r.lang = 'ko-KR';
                    r.continuous = true;
                    r.interimResults = true;
                    let finalText = '';
                    r.onresult = (e) => {
                        let interim = '';
                        for (let i = e.resultIndex; i < e.results.length; i++) {
                            const t = e.results[i][0].transcript;
                            if (e.results[i].isFinal) finalText += t + ' ';
                            else interim += t;
                        }
                        setSttFinal(finalText);
                        setSttText(finalText + interim);
                    };
                    r.onerror = (e) => dbg('STT', 'STT 오류', e.error);
                    r.onend = () => dbg('STT', 'STT 종료');
                    r.start();
                    recognitionRef.current = r;
                    dbg('STT', '✅ STT 시작 (한국어)');
                } catch(e) {
                    dbg('ERR', 'STT 시작 실패', e.toString());
                }
            };

            const stopSTT = () => {
                if (recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch(e) {}
                    recognitionRef.current = null;
                }
            };

            const start = async () => {
                sfx.click();
                setSttText('');
                setSttFinal('');
                setEditableStt('');
                try {
                    const stream = providedStream || await navigator.mediaDevices.getUserMedia({ audio: true });
                    mr.current = new MediaRecorder(stream);
                    chunks.current = [];
                    mr.current.ondataavailable = e => { if (e.data.size > 0) chunks.current.push(e.data); };
                    mr.current.onstop = () => {
                        const blob = new Blob(chunks.current, { type: 'audio/webm' });
                        setAudioUrl(URL.createObjectURL(blob));
                        const rd = new FileReader();
                        rd.readAsDataURL(blob);
                        rd.onloadend = () => { b64.current = rd.result; };
                    };
                    mr.current.start();
                    setState('rec');
                    startSTT(); // 녹음과 동시에 STT 시작
                } catch (e) { alert("마이크를 사용할 수 없습니다."); }
            };

            const stop = () => {
                sfx.click();
                stopSTT();
                if (mr.current && mr.current.state === 'recording') {
                    mr.current.stop();
                    if (!providedStream) mr.current.stream.getTracks().forEach(t => t.stop());
                }
                setEditableStt(sttFinal.trim());
                setState('done');

            const submitText = () => {
                if (!textInput.trim()) {
                    alert('다짐을 입력해주세요!');

                onDone(null, textInput.trim());

                const finalText = (editableStt || sttFinal || '').trim();

                                <span className="jua fs-lg text-red-800">목소리로</span>
                                <span className="ngo fs-sm text-red-700">녹음하기</span>
                            </button>
                            <button onClick={() => { sfx.click(); setMode('text'); }} className="flex-1 py-8 bg-gradient-to-b from-blue-100 to-blue-200 hover:from-blue-200 hover:to-blue-300 border-4 border-blue-300 rounded-3xl btn-shadow flex flex-col items-center gap-2">
                                <span className="text-7xl">⌨️</span>
                                <span className="jua fs-lg text-blue-800">글자로</span>
                                <span className="ngo fs-sm text-blue-700">써보기</span>
                            </button>
                        </div>
                        <button onClick={() => { sfx.click(); onSkip(); }} className="py-3 px-6 bg-white text-slate-500 jua rounded-2xl btn-shadow fs-md">
                            건너뛰기
                        </button>
                    </div>

            );

            // 텍스트 모드
            if (mode === 'text') return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-gradient-to-b from-blue-50 to-cyan-100 p-4 text-center overflow-y-auto custom-sc">

                        <Fairy mood="happy" cls="scale-100" />
                        <h2 className="fs-2xl jua text-blue-900">⌨️ 다짐 글로 쓰기!</h2>
                        <div className="w-full bg-white/90 rounded-2xl p-4 flex flex-col gap-2 text-left shadow-sm border-2 border-blue-100">

                            {examples.map((ex, i) => (
                                <p key={i} className="fs-md jua text-slate-700 leading-relaxed pl-3 border-l-4 border-blue-300">{ex}</p>
                            ))}
                        </div>
                        <textarea
                            value={textInput}
                            onChange={e => setTextInput(e.target.value)}
                            placeholder="여기에 나의 다짐을 적어보세요!"
                            rows="4"
                            className="w-full p-4 fs-lg jua rounded-2xl border-4 border-blue-200 bg-white outline-none focus:border-blue-400 text-slate-700 transition-colors resize-none leading-relaxed"
                        />
                        <div className="flex gap-2 w-full">
                            <button onClick={() => { sfx.click(); setMode('choose'); setTextInput(''); }} className="py-4 px-4 bg-white text-slate-500 jua rounded-2xl btn-shadow fs-md">
                                ← 뒤로
                            </button>
                            <button onClick={submitText} className="flex-1 py-4 bg-blue-500 hover:bg-blue-600 text-white fs-lg jua rounded-2xl btn-shadow flex items-center justify-center gap-2">
                                💾 제출하기
                            </button>

                    </div>
                </div>

            // 녹음 모드
            return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-gradient-to-b from-amber-50 to-yellow-100 p-4 text-center overflow-y-auto custom-sc">

        /* 입학 전 체크리스트 */
        const ChecklistPopup = ({ questions, studentNumber, speakerOn, onComplete }) => {

            const btns = ['bg-pink-500 hover:bg-pink-600', 'bg-blue-500 hover:bg-blue-600', 'bg-green-500 hover:bg-green-600', 'bg-orange-500 hover:bg-orange-600', 'bg-purple-500 hover:bg-purple-600'];
            const borders = ['border-pink-300', 'border-blue-300', 'border-green-300', 'border-orange-300', 'border-purple-300'];

            const cb = bgs[idx % 5], ct = titles[idx % 5], cn = btns[idx % 5], cbd = borders[idx % 5];

            useEffect(() => () => stopSpeak(), []);

            const ans = async () => {
                sfx.click();
                if (idx < questions.length - 1) { setIdx(idx + 1); return; }
                setSaving(true);
                await api.post({ action: 'markChecklistComplete', studentNumber });
                sfx.complete();
                setSaving(false);
                onComplete();
            };

            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-3">
                    <div className={`bg-white w-full rounded-3xl overflow-hidden shadow-2xl pop transition-colors duration-500 max-w-lg border-4 ${cbd}`}>
                        <div className={`bg-gradient-to-b ${cb} p-5 text-center transition-all duration-500`}>
                            <span className={`inline-block bg-white/70 ${ct} fs-sm jua px-3 py-1 rounded-full mb-3`}>
                                📚 입학 전 체크리스트 {idx + 1}/{questions.length}
                            </span>
                            <h2 className={`fs-xl jua ${ct} break-keep leading-relaxed transition-colors duration-500 flex items-center justify-center`} style={{minHeight: '5rem'}}>
                                <HighlightedText text={questions[idx].항목} speakerOn={speakerOn} autoPlay={true} />
                            </h2>
                        </div>
                        <div className="p-5 flex flex-col gap-3">
                            <button disabled={saving} onClick={ans} className={`w-full py-4 fs-lg text-white rounded-2xl jua btn-shadow ${cn} ${saving ? 'opacity-50' : ''}`}>
                                {saving ? '저장 중...' : '✅ 네, 완료했어요!'}
                            </button>
                            <button disabled={saving} onClick={ans} className={`w-full py-4 fs-md bg-slate-100 text-slate-700 rounded-2xl jua btn-shadow ${saving ? 'opacity-50' : ''}`}>
                                💪 아직 준비 중이에요
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* MAIN APP */
        function App() {
            const [loading, setLoading] = useState(true);
            const [appData, setAppData] = useState(null);
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('student');

            const [missions, setMissions] = useState([]);
            const [missionsResult, setMissionsResult] = useState(null);
            const [quizDone, setQuizDone] = useState(false);
            const [showMission, setShowMission] = useState(false);
            const [showQuiz, setShowQuiz] = useState(false);
            const [showRec, setShowRec] = useState(false);
            const [studentSaved, setStudentSaved] = useState(false);
            const [textPledge, setTextPledge] = useState('');
            const [audioPledge, setAudioPledge] = useState(null);
            const [recordId, setRecordId] = useState(null); // 학생 저장 후 받은 레코드 ID
            const [studentSaveResult, setStudentSaveResult] = useState(null); // 'success' | 'partial' | 'fail'

            const [parentSup, setParentSup] = useState('');
            const [parentNote, setParentNote] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const [showChecklist, setShowChecklist] = useState(false);
            const [micChecked, setMicChecked] = useState(false);
            const [micStream, setMicStream] = useState(null);
            const [tips, setTips] = useState([]);
            const [done, setDone] = useState(false);
            const [parentSubmitted, setParentSubmitted] = useState(false);

            const [speakerOn, setSpeakerOn] = useState(false); // 기본 OFF
            const [showDebug, setShowDebug] = useState(false);
            const [activePopup, setActivePopup] = useState(null);
            const [bigSticker, setBigSticker] = useState(false);

            useEffect(() => {
                if ('speechSynthesis' in window) {
                    const load = () => {
                        const v = window.speechSynthesis.getVoices();
                        if (v.length) dbg('TTS', `음성 ${v.length}개 로드됨`);
                    };
                    load();
                    window.speechSynthesis.onvoiceschanged = load;
                }
            }, []);

            const pickMissions = (data) => {
                const all = (data.Checklist || []).filter(c => c.카테고리 === '데일리');
                setMissions([...all].sort(() => 0.5 - Math.random()).slice(0, 3));
            };

            useEffect(() => {
                const load = async () => {
                    let data = null;
                    if (GAS_URL) data = await api.getData();
                    if (!data) {
                        await new Promise(r => setTimeout(r, 600));
                        data = MOCK;
                        dbg('WARN', 'MOCK 데이터로 진행');
                    }
                    setAppData(data);
                    if (data.Education && data.Education.length) {
                        const s = [...data.Education].sort(() => 0.5 - Math.random());
                        setTips(s.slice(0, 1));
                    }
                    pickMissions(data);
                    setLoading(false);
                };
                load();
            }, []);

            const toggleSpeaker = () => {
                if (speakerOn) {
                    setSpeakerEnabled(false);
                    sfx.click(); // 끄기 직전엔 OFF라 어차피 안 들림
                    stopSpeak();
                    setSpeakerOn(false);
                } else {
                    setSpeakerEnabled(true);
                    setSpeakerOn(true);
                    sfx.click();
                    setTimeout(() => speak('스피커를 켰어요. 이제 문제를 읽어줄게요!'), 200);
                }
            };

            const requestMic = async () => {
                sfx.click();
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                    setMicStream(s);
                    dbg('MIC', '권한 허용됨');
                } catch (e) {
                    dbg('MIC', '권한 거부 또는 불가', e.toString());
                }
                setMicChecked(true);
            };
            const skipMic = () => {
                sfx.click();
                setMicChecked(true);
                dbg('MIC', '건너뛰기');
            };

            const selectUser = (u) => {
                setUser(u);
                sfx.click();
                if (speakerOn) speak(`${u.이름} 어린이, 환영해요!`);
                const ok = (appData.ChecklistStats || []).find(s => String(s.학번) === String(u.학번) && s.완료여부 === '완료');
                if (!ok) setShowChecklist(true);
            };

            // 🎤 학생 다짐 완료 시 즉시 저장 (부모 안 기다림)
            const saveStudentNow = async (audioB64, txt, missionRes) => {
                if (!user) return;
                dbg('SAVE', '🚀 학생 즉시 저장 시작', { hasAudio: !!audioB64, hasText: !!txt });

                const missionResult = missionRes
                    ? missions.map((m, i) => `${m.항목}: ${missionRes[i] === 'good' ? '😃 잘했어요' : '☹️ 아쉬워요'}`).join('\n')
                    : '';
                let audioUrl = '';
                let saveStatus = 'success';

                if (GAS_URL) {
                    if (audioB64) {
                        dbg('SAVE', '🎤 오디오 업로드 시작', { sizeKB: Math.round(audioB64.length / 1024) });
                        const ar = await api.post({ action: 'uploadAudioToDrive', base64Data: audioB64, filename: `${user.학번}_${user.이름}_${Date.now()}.webm` });
                        if (ar && ar.success) {
                            audioUrl = ar.fileUrl;
                            dbg('SAVE', '✅ 오디오 업로드 성공', audioUrl);
                        } else {
                            dbg('ERR', '❌ 오디오 업로드 실패', ar);
                            saveStatus = 'partial'; // 텍스트는 저장되지만 오디오 실패
                        }
                    }

                    const record = {
                        studentNumber: user.학번,
                        studentName: user.이름,
                        missionResult,
                        pledgeText: txt || '',
                        audioUrl,
                    };
                    const sr = await api.post({ action: 'saveStudentRecord', record });
                    if (sr && sr.success) {
                        setRecordId(sr.recordId);
                        dbg('SAVE', '✅ 학생 기록 저장 성공', sr);
                    } else {
                        dbg('ERR', '❌ 학생 기록 저장 실패', sr);
                        saveStatus = 'fail';
                    }
                } else {
                    dbg('MOCK', '학생 저장 시뮬레이션');
                    setRecordId('MOCK_' + Date.now());
                }

                setStudentSaveResult(saveStatus);
                if (saveStatus !== 'fail') sfx.complete();
            };

            const resetAll = () => {
                sfx.click();
                stopSpeak();
                setDone(false); setUser(null); setMissionsResult(null); setQuizDone(false);
                setShowMission(false); setShowQuiz(false); setShowRec(false); setStudentSaved(false);
                setParentSup(''); setParentNote(''); setTab('student'); setParentSubmitted(false);
                if (appData) pickMissions(appData);
            };

            const renderPopup = () => {
                if (!activePopup) return null;
                const close = () => { sfx.click(); setActivePopup(null); stopSpeak(); };

                if (activePopup === 'tips30') return (
                    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-3 fade-up">
                        <div className="bg-white rounded-3xl shadow-xl w-full max-w-lg max-h-[85vh] flex flex-col overflow-hidden">
                            <div className="p-4 bg-gradient-to-r from-indigo-50 to-purple-50 border-b border-indigo-100 flex justify-between items-center">
                                <h2 className="jua fs-md text-indigo-900">🏫 초등학교 생활 꿀팁 30선</h2>
                                <button onClick={close} className="bg-white text-slate-500 hover:text-slate-700 px-3 py-1 rounded-full shadow-sm fs-sm jua">닫기</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-3 custom-sc">
                                {appData.Transition.map((q, i) => (
                                    <div key={i} className="flex flex-col gap-2 p-3 bg-white rounded-2xl shadow-sm border-2 border-indigo-50">
                                        <div className="flex gap-2 items-start">
                                            <span className="text-indigo-500 jua fs-md shrink-0">Q.</span>
                                            <span className="jua text-indigo-900 fs-sm">{q.질문}</span>
                                        </div>
                                        {q.답변 && (
                                            <div className="flex gap-2 items-start ml-2 mt-2 pt-2 border-t border-slate-100">
                                                <span className="text-amber-500 jua fs-md shrink-0">A.</span>
                                                <span className="ngo text-slate-700 fs-sm leading-relaxed">{q.답변}</span>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );

                if (activePopup === 'eduTips') return (
                    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-3 fade-up">
                        <div className="bg-white rounded-3xl shadow-xl w-full max-w-lg max-h-[85vh] flex flex-col overflow-hidden">
                            <div className="p-4 bg-gradient-to-r from-blue-50 to-cyan-50 border-b border-blue-100 flex justify-between items-center">
                                <h2 className="jua fs-md text-blue-900">💡 오늘의 가정 연계 교육 팁</h2>
                                <button onClick={close} className="bg-white text-slate-500 hover:text-slate-700 px-3 py-1 rounded-full shadow-sm fs-sm jua">닫기</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-3 custom-sc">
                                {tips.map((t, i) => (
                                    <div key={i} className="border-l-4 border-blue-400 pl-4 py-2">
                                        <h4 className="jua text-blue-900 mb-2 fs-md">{t.제목}</h4>
                                        <p className="ngo fs-md text-slate-700 leading-relaxed bg-blue-50 p-3 rounded-xl">{t.내용}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );

                if (activePopup === 'site') return (
                    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-3 fade-up">
                        <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm flex flex-col overflow-hidden text-center pop">
                            <div className="p-5 bg-gradient-to-b from-emerald-50 to-green-100 flex flex-col items-center gap-2">
                                <span className="text-5xl mb-1 bob">🌱</span>
                                <h2 className="jua fs-lg text-emerald-900">유초이음 사이트</h2>
                                <p className="ngo text-emerald-700 fs-sm">입학을 앞둔 우리 아이들을 위한<br/>다양한 정보가 가득해요!</p>
                            </div>
                            <div className="p-5 flex flex-col gap-2">
                                <a href="https://www.parents.go.kr/usr/wap/list.do?app=10210&listType=thumb&ctgryCodeSearch=1&nttSjSearchOr=&searchField=&searchText=" target="_blank" rel="noopener noreferrer" onClick={() => sfx.click()}
                                    className="py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl jua fs-md w-full transition-colors btn-shadow">
                                    새 창으로 이동 →
                                </a>
                                <button onClick={close} className="py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl jua fs-sm w-full">
                                    닫기
                                </button>
                            </div>
                        </div>
                    </div>
                );
                return null;
            };

            if (loading) return <div className="app-frame"><Spinner text="데이터 불러오는 중..." /></div>;
            if (isSaving) return <div className="app-frame"><Spinner text="기록 저장 중..." /></div>;

            // 마이크
            if (!micChecked) return (
                <div className="app-frame">
                    <div className="h-full w-full flex flex-col items-center justify-center p-5 text-center bg-gradient-to-b from-blue-50 to-blue-100 overflow-y-auto custom-sc">
                        <Fairy mood="happy" cls="mb-3 scale-110" />
                        <h1 className="fs-2xl jua text-blue-900 mb-3">🎤 마이크 준비하기</h1>
                        <p className="fs-md ngo text-blue-700 mb-6 leading-relaxed px-4 max-w-md">
                            내 목소리로 다짐을 남기기 위해<br />마이크가 필요해요!
                        </p>
                        <div className="w-full max-w-md flex flex-col gap-3">
                            <button onClick={requestMic} className="w-full py-5 fs-lg bg-blue-500 hover:bg-blue-600 text-white rounded-2xl jua btn-shadow flex items-center justify-center gap-2">
                                🎤 허용하고 시작하기
                            </button>
                            <button onClick={skipMic} className="w-full py-4 fs-md bg-white text-slate-500 rounded-2xl ngo border-2 border-slate-200">
                                마이크 없이 계속하기
                            </button>
                        </div>
                        <p className="fs-sm text-slate-500 mt-4 break-keep px-4 ngo">마이크 없어도 체크리스트·퀴즈는 이용할 수 있어요!</p>
                    </div>
                </div>
            );

            // 사용자 선택
            if (!user) return (
                <div className="app-frame">
                    <div className="h-full w-full flex flex-col items-center justify-center p-5 bg-gradient-to-b from-amber-50 via-pink-50 to-amber-100 overflow-y-auto custom-sc">
                        <Fairy mood="happy" cls="mb-3 scale-110" />
                        <h1 className="fs-2xl jua text-amber-800 mb-2 text-center">유초이음 적응 앱</h1>
                        <p className="ngo text-amber-600 fs-md mb-6">🌟 오늘도 한 뼘 자라는 우리 🌟</p>
                        {!GAS_URL && (
                            <div className="mb-4 bg-orange-50 border-2 border-orange-200 rounded-2xl px-4 py-2 fs-sm text-orange-700 jua text-center max-w-sm">
                                ⚠️ 샘플 모드
                            </div>
                        )}
                        <div className="w-full max-w-md bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-xl border-4 border-amber-200">
                            <p className="text-center fs-md text-slate-600 jua mb-4">👋 누가 접속했나요?</p>
                            <select
                                className="w-full p-4 rounded-2xl border-amber-300 bg-amber-50 jua text-slate-700 fs-lg outline-none focus:border-amber-500 transition-colors cursor-pointer"
                                style={{borderWidth: '3px'}}
                                defaultValue=""
                                onChange={e => {
                                    const f = appData.Students.find(s => String(s.학번) === String(e.target.value));
                                    if (f) selectUser(f);
                                }}>
                                <option value="" disabled>-- 학생 선택 --</option>
                                {appData.Students.map((s, i) => (
                                    <option key={s.학번} value={s.학번}>{i + 1}번 {s.이름}</option>
                                ))}
                            </select>
                            <p className="text-center text-slate-400 fs-sm mt-3 ngo">번호를 눌러 친구를 찾아보세요</p>
                        </div>

                        <button onClick={() => { sfx.click(); setShowDebug(true); }}
                            className="mt-4 fs-sm text-slate-400 underline opacity-60 ngo">
                            🛠 연결 진단
                        </button>
                    </div>
                    {showDebug && <DebugPanel onClose={() => setShowDebug(false)} />}
                </div>
            );

            const preEnroll = appData.Checklist.filter(c => c.카테고리 === '입학전');
            if (showChecklist && preEnroll.length > 0) return (
                <div className="app-frame">
                    <ChecklistPopup questions={preEnroll} studentNumber={user.학번} speakerOn={speakerOn} onComplete={() => {
                        setAppData({ ...appData, ChecklistStats: [...(appData.ChecklistStats || []), { 학번: user.학번, 완료여부: '완료' }] });
                        setShowChecklist(false);
                    }} />
                </div>
            );

            if (showMission) return <div className="app-frame"><MissionPopup missions={missions} speakerOn={speakerOn} onComplete={r => { setMissionsResult(r); setShowMission(false); setShowQuiz(true); }} /></div>;
            if (showQuiz) return <div className="app-frame"><QuizPopup speakerOn={speakerOn} onComplete={() => { setShowQuiz(false); setQuizDone(true); setShowRec(true); }} /></div>;
            if (showRec) return <div className="app-frame"><RecordingScreen providedStream={micStream} speakerOn={speakerOn} onDone={(audioB64, txt) => { setAudioPledge(audioB64); setTextPledge(txt || ''); setShowRec(false); setStudentSaved(true); setIsSaving(true); saveStudentNow(audioB64, txt, missionsResult).finally(() => setIsSaving(false)); }} onSkip={() => { setShowRec(false); setStudentSaved(true); setIsSaving(true); saveStudentNow(null, null, missionsResult).finally(() => setIsSaving(false)); }} /></div>;

            if (done) return (
                <div className="app-frame">
                    <div className="h-full w-full flex flex-col items-center justify-center p-5 text-center bg-gradient-to-b from-green-50 via-yellow-50 to-green-100 overflow-y-auto custom-sc relative">
                        <StickerBurst stickers={['🏆','⭐','🌟','💖','🎉','🌈','✨','👏']} />
                        <Fairy mood="happy" cls="mb-2 scale-125" />
                        <div className="text-7xl mb-2 bob">🏅</div>
                        <h1 className="fs-2xl jua rainbow-text mb-3">오늘의 기록 완성!</h1>
                        <div className="bg-white/90 p-5 rounded-3xl shadow-md mb-4 w-full max-w-lg border-4 border-green-200">
                            <p className="jua text-green-700 fs-lg mb-3">
                                <span className="text-green-500 fs-2xl jua">{user.이름}</span> 어린이, 참 잘했어요! 👍<br />
                                <span className="fs-md ngo text-green-600 block mt-1">멋진 초등학생이 될 준비가 되었네요. 🌱</span>
                            </p>
                            {missionsResult && (
                                <div className="space-y-2">
                                    {missions.map((m, i) => (
                                        <div key={i} className="flex items-center justify-between bg-green-50 rounded-xl px-3 py-2">
                                            <span className="fs-sm ngo text-slate-700 text-left">{m.항목}</span>
                                            <span className="text-3xl">{missionsResult[i] === 'good' ? '😃' : '☹️'}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <button onClick={resetAll} className="py-4 px-8 fs-lg bg-green-500 hover:bg-green-600 text-white rounded-2xl jua btn-shadow">
                            🔁 처음 화면으로
                        </button>
                    </div>
                </div>
            );

            const studentDone = missionsResult !== null && quizDone && studentSaved;

            return (
                <div className="app-frame">
                    {bigSticker && <StickerBurst stickers={['🎉','✨','💖','🌟','👍','🏆']} />}
                    {renderPopup()}
                    {showDebug && <DebugPanel onClose={() => setShowDebug(false)} />}

                    {/* 헤더 */}
                    <header className="bg-white px-3 py-2 flex items-center justify-between shadow-sm flex-shrink-0 border-b-2 border-amber-100">
                        <div className="flex items-center gap-1">
                            <Fairy cls="scale-50 -ml-3 -my-5 shrink-0" />
                            <h1 className="fs-md jua text-amber-800 -ml-1">유초이음</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={toggleSpeaker} className={"w-11 h-11 rounded-full jua text-xl transition-all flex items-center justify-center " + (speakerOn ? 'bg-blue-100 text-blue-600 speaker-on-glow' : 'bg-slate-100 text-slate-400')}
                                title={speakerOn ? '스피커 끄기' : '스피커 켜기'}>
                                {speakerOn ? '🔊' : '🔇'}
                            </button>
                            <div className="fs-sm jua bg-amber-100 text-amber-800 px-3 py-1 rounded-full whitespace-nowrap">
                                {user.이름}
                            </div>
                            <button onClick={() => { sfx.click(); setShowDebug(true); }}
                                className="w-10 h-10 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-600 text-base flex items-center justify-center transition-colors"
                                title="연결 진단 (디버그)">🛠</button>
                        </div>
                    </header>

                    {/* 탭 */}
                    <div className="flex px-3 pt-2 pb-2 gap-2 bg-slate-50 flex-shrink-0">
                        <button onClick={() => { sfx.click(); setTab('student'); }} className={"flex-1 py-3 rounded-xl jua fs-md transition-colors flex items-center justify-center gap-1 " + (tab === 'student' ? 'bg-amber-400 text-amber-900 shadow-md' : 'bg-white text-slate-400')}>
                            😊 아이 활동
                        </button>
                        <button onClick={() => { sfx.click(); setTab('parent'); }} className={"flex-1 py-3 rounded-xl jua fs-md transition-colors flex items-center justify-center gap-1 " + (tab === 'parent' ? 'bg-blue-400 text-blue-900 shadow-md' : 'bg-white text-slate-400')}>
                            👨‍👩‍👧 학부모님
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-sc p-3">
                        {tab === 'student' && (
                            <div className="fade-up flex flex-col gap-3 max-w-2xl mx-auto w-full">
                                <div className="bg-white p-5 rounded-3xl shadow-sm border-4 border-amber-100 text-center">
                                    <div className="text-5xl mb-2 wiggle inline-block">🌟</div>
                                    <h2 className="jua fs-xl text-slate-800 mb-1">오늘의 성장 미션</h2>
                                    <p className="fs-sm ngo text-slate-500 mb-4">아이와 함께 미션을 수행해 보세요!</p>
                                    <div className="grid grid-cols-3 gap-2 mb-4">
                                        <div className={"p-3 rounded-2xl border-2 transition-all " + (missionsResult ? 'bg-green-50 border-green-300 scale-105' : 'bg-slate-50 border-slate-100')}>
                                            <div className="text-4xl mb-1">📋</div>
                                            <div className={"fs-sm jua " + (missionsResult ? 'text-green-700' : 'text-slate-400')}>{missionsResult ? '✓ 미션' : '미션'}</div>
                                        </div>
                                        <div className={"p-3 rounded-2xl border-2 transition-all " + (quizDone ? 'bg-green-50 border-green-300 scale-105' : 'bg-slate-50 border-slate-100')}>
                                            <div className="text-4xl mb-1">💡</div>
                                            <div className={"fs-sm jua " + (quizDone ? 'text-green-700' : 'text-slate-400')}>{quizDone ? '✓ 퀴즈' : '퀴즈'}</div>
                                        </div>
                                        <div className={"p-3 rounded-2xl border-2 transition-all " + (studentSaved ? 'bg-green-50 border-green-300 scale-105' : 'bg-slate-50 border-slate-100')}>
                                            <div className="text-4xl mb-1">🎤</div>
                                            <div className={"fs-sm jua " + (studentSaved ? 'text-green-700' : 'text-slate-400')}>{studentSaved ? '✓ 다짐' : '다짐'}</div>
                                        </div>
                                    </div>
                                    {!studentDone && (
                                        <button onClick={() => { sfx.click(); setShowMission(true); }} className="w-full py-4 bg-gradient-to-r from-amber-400 to-orange-400 hover:from-amber-500 hover:to-orange-500 text-white rounded-2xl jua fs-lg btn-shadow">
                                            🚀 활동 시작하기
                                        </button>
                                    )}
                                    {studentDone && (
                                        <div className="py-4 bg-green-100 text-green-800 rounded-2xl jua fs-lg border-2 border-green-200">
                                            ✅ 아이 활동 완료!
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white p-4 rounded-2xl border-2 border-blue-100 flex items-center gap-3">
                                    <div className="text-4xl">💡</div>
                                    <div className="text-left flex-1">
                                        <p className="jua fs-md text-blue-800">스피커를 켜면 문제를 읽어줘요!</p>
                                        <p className="ngo fs-sm text-blue-600">우측 상단 🔇 버튼을 눌러보세요</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'parent' && (
                            <div className="fade-up flex flex-col gap-3 max-w-2xl mx-auto w-full">
                                <div className="bg-white rounded-2xl shadow-sm border-t-4 border-blue-400 p-4 flex flex-col gap-3">
                                    <h2 className="jua text-blue-900 fs-md leading-snug">
                                        👨‍👩‍👧 아이가 학교생활에 잘 적응하도록 돕고 계신가요?
                                    </h2>
                                    <div className="flex gap-2">
                                        <button onClick={() => { sfx.click(); setParentSup('잘 돕고 있음'); }}
                                            className={"flex-1 py-3 jua rounded-xl fs-sm transition-all " + (parentSup === '잘 돕고 있음' ? 'bg-blue-500 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200')}>
                                            👍 잘 돕고 있어요
                                        </button>
                                        <button onClick={() => { sfx.click(); setParentSup('더 노력할 예정'); }}
                                            className={"flex-1 py-3 jua rounded-xl fs-sm transition-all " + (parentSup === '더 노력할 예정' ? 'bg-orange-400 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200')}>
                                            💪 도움이 필요해요
                                        </button>
                                    </div>
                                    <textarea value={parentNote} onChange={e => setParentNote(e.target.value)}
                                        className="p-4 fs-md jua rounded-xl border-2 border-slate-100 bg-slate-50 outline-none focus:border-blue-400 text-slate-700 transition-colors resize-none min-h-[6rem] leading-relaxed"
                                        rows="3"
                                        placeholder="가정에서 느낀 점을 자유롭게 적어주세요." />

                                    {!parentSubmitted ? (
                                        <button disabled={isSaving} onClick={async () => {
                                            setIsSaving(true);
                                            dbg('SAVE', '👨‍👩‍👧 학부모 소감 저장 시작', { recordId, status: parentSup });
                                            if (GAS_URL && recordId) {
                                                const r = await api.post({ action: 'updateParentRecord', recordId, parentStatus: parentSup, parentNote });
                                                if (r && r.success) {
                                                    dbg('SAVE', '✅ 학부모 소감 저장 성공');
                                                    sfx.complete();
                                                } else {
                                                    dbg('ERR', '❌ 학부모 소감 저장 실패', r);
                                                    alert('⚠️ 학부모 소감 저장 실패: ' + (r && r.error ? r.error : '알 수 없는 오류'));
                                                    setIsSaving(false);
                                                    return;
                                                }
                                            }
                                            setIsSaving(false);
                                            setParentSubmitted(true);
                                            setBigSticker(true);
                                            setTimeout(() => setBigSticker(false), 1700);
                                        }}
                                            className={"py-3 fs-md text-white rounded-xl jua btn-shadow transition-all flex items-center justify-center gap-2 " + (isSaving ? 'bg-slate-400' : 'bg-blue-600 hover:bg-blue-700')}>
                                            📤 제출하기 (선택)
                                        </button>
                                    ) : (
                                        <div className="flex flex-col gap-2">
                                            <div className="bg-green-100 text-green-800 jua fs-sm py-3 rounded-xl text-center flex items-center justify-center gap-2 border-2 border-green-200">
                                                ✅ 소감 제출 완료!
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { sfx.click(); setParentSubmitted(false); }} className="flex-1 py-3 bg-slate-100 text-slate-600 jua rounded-xl btn-shadow fs-sm">✏️ 수정하기</button>
                                                <button onClick={() => { sfx.click(); setDone(true); }} className="flex-1 py-3 bg-amber-500 text-white jua rounded-xl btn-shadow fs-sm">🏆 칭찬창</button>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="flex flex-col gap-2">
                                    <p className="text-center text-slate-500 jua fs-sm">🔍 참고 자료 보기</p>
                                    <button onClick={() => { sfx.click(); setActivePopup('tips30'); }}
                                        className="w-full bg-indigo-50 hover:bg-indigo-100 active:scale-95 border-2 border-indigo-200 rounded-2xl flex items-center justify-between px-4 py-3 transition-all">
                                        <span className="jua text-indigo-900 fs-md">🏫 초등학교 생활 꿀팁 30선</span>
                                        <span className="bg-indigo-500 text-white px-3 py-1 rounded-full jua fs-xs">열기</span>
                                    </button>
                                    <button onClick={() => { sfx.click(); setActivePopup('eduTips'); }}
                                        className="w-full bg-blue-50 hover:bg-blue-100 active:scale-95 border-2 border-blue-200 rounded-2xl flex items-center justify-between px-4 py-3 transition-all">
                                        <span className="jua text-blue-900 fs-md">💡 가정 연계 교육 팁</span>
                                        <span className="bg-blue-500 text-white px-3 py-1 rounded-full jua fs-xs">열기</span>
                                    </button>
                                    <button onClick={() => { sfx.click(); setActivePopup('site'); }}
                                        className="w-full bg-emerald-50 hover:bg-emerald-100 active:scale-95 border-2 border-emerald-200 rounded-2xl flex items-center justify-between px-4 py-3 transition-all">
                                        <span className="jua text-emerald-900 fs-md">🌱 유초이음 활용 사이트</span>
                                        <span className="bg-emerald-500 text-white px-3 py-1 rounded-full jua fs-xs">열기</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ErrBound><App /></ErrBound>);
    </script>
</body>

</html>
